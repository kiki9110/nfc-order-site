<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITパスポート 語源クイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;padding:1rem;min-height:100vh}
#app{max-width:680px;margin:0 auto;padding:1rem 0}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.title{font-size:18px;font-weight:600;color:#111}
.score-badge{font-size:13px;color:#666;background:#e8e8e4;padding:4px 12px;border-radius:20px}
.mode-select{display:flex;gap:8px;margin-bottom:1rem}
.mode-btn{flex:1;padding:9px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#666;cursor:pointer;transition:all 0.15s}
.mode-btn.active{border-color:#0F6E56;color:#0F6E56;background:#E1F5EE;font-weight:500}
.progress-bar-wrap{height:4px;background:#ddd;border-radius:2px;margin-bottom:1.25rem}
.progress-bar{height:4px;background:#1D9E75;border-radius:2px;transition:width 0.4s ease}
.qcount-select{display:flex;align-items:center;gap:6px;margin-bottom:0.9rem}
.qcount-label{font-size:12px;color:#999;flex-shrink:0}
.qcount-btn{padding:4px 14px;font-size:12px;border:1px solid #ccc;border-radius:20px;background:#fff;color:#666;cursor:pointer;transition:all 0.15s}
.qcount-btn.active{border-color:#0F6E56;color:#0F6E56;background:#E1F5EE;font-weight:600}
.qcount-btn:hover:not(.active){background:#f5f5f0}
.question-card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:0.75rem}
.q-num{font-size:12px;color:#aaa;margin-bottom:6px}
.q-text{font-size:15px;line-height:1.75;color:#222}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0.75rem}
.opt-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:500;color:#222;cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.5;width:100%}
.opt-btn:hover:not(:disabled){background:#f5f5f0}
.opt-btn.correct{background:#E1F5EE;border-color:#0F6E56;color:#085041}
.opt-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.opt-btn.reveal{background:#E1F5EE;border-color:#0F6E56;color:#085041}
.opt-btn:disabled{cursor:default}
.exp-card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:0.75rem;display:none}
.result-label{font-size:13px;font-weight:600;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid #eee}
.result-label.ok{color:#085041}
.result-label.ng{color:#791F1F}
.abbr-full{font-size:13px;color:#666;margin-bottom:0.75rem}
.abbr-full strong{color:#222}
.letter-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.letter-row{display:flex;align-items:center;gap:0}
.letter-char{font-size:22px;font-weight:600;color:#1D9E75;min-width:50px;line-height:1}
.divider{width:1px;height:16px;background:#ddd;margin:0 10px}
.letter-en{font-size:13px;color:#888;min-width:160px}
.letter-ja{font-size:14px;color:#222;font-weight:500}
.memo-box{background:#f5f5f0;border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.7;color:#555;border-left:3px solid #1D9E75}
.exp-qblock{background:#fdf8f0;border:1px solid #e8e0d0;border-radius:8px;padding:10px 14px;margin-bottom:1rem}
.exp-qblock-label{font-size:10px;color:#bbb;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.exp-qblock-text{font-size:13px;line-height:1.85;color:#444}
.hl-red{color:#C0392B;font-weight:800}
.letter-en .hl-red{font-size:inherit}
.next-btn{width:100%;padding:12px;background:#fff;border:1px solid #ccc;border-radius:8px;font-size:14px;color:#222;cursor:pointer;display:none;margin-top:4px}
.next-btn:hover{background:#f5f5f0}
.other-section-label{font-size:11px;font-weight:700;color:#aaa;letter-spacing:0.8px;text-transform:uppercase;margin:1.1rem 0 0.45rem;padding-left:2px}
.mini-card{background:#fafafa;border:1px solid #e0e0d8;border-radius:10px;padding:0.85rem 1.1rem;margin-bottom:0.5rem}
.mini-card.wrong-chosen{background:#FCEBEB;border-color:#C0392B}
.mini-type-label{font-size:10px;font-weight:700;margin-bottom:5px;letter-spacing:0.3px;color:#791F1F}
.mini-header{display:flex;align-items:baseline;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.mini-abbr{font-size:15px;font-weight:700;flex-shrink:0}
.mini-full{font-size:11px;color:#999;line-height:1.4}
.mini-letters{font-size:12px;color:#666;margin-bottom:5px;line-height:1.7}
.mini-def{font-size:12px;color:#555;line-height:1.75;margin-bottom:5px;padding:5px 8px;background:rgba(0,0,0,0.03);border-radius:5px}
.mini-letter-c{font-weight:700;color:#1D9E75}
.mini-card.wrong-chosen .mini-letter-c{color:#A32D2D}
.mini-sep{color:#ccc;margin:0 2px}
.mini-memo{font-size:12px;color:#666;line-height:1.6;background:#ededea;border-radius:6px;padding:5px 9px}
.mini-card.wrong-chosen .mini-memo{background:#f5dada}
.result-card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:2rem;text-align:center}
.result-score{font-size:52px;font-weight:600;color:#1D9E75;margin-bottom:8px}
.result-msg{font-size:15px;color:#666;margin-bottom:1.5rem}
.restart-btn{padding:10px 24px;background:#fff;border:1px solid #ccc;border-radius:8px;font-size:14px;cursor:pointer}
.restart-btn:hover{background:#f5f5f0}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.cat-btn{padding:5px 12px;font-size:12px;border:1px solid #ccc;border-radius:20px;background:#fff;color:#666;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.cat-btn.active{background:#0F6E56;border-color:#0F6E56;color:#fff;font-weight:600}
.cat-btn:hover:not(.active){background:#f5f5f0}
.browse-card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.1rem 1.3rem;margin-bottom:0.65rem}
.browse-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:8px}
.browse-abbr{font-size:19px;font-weight:700;color:#1D9E75;flex-shrink:0}
.browse-cat-tag{font-size:10px;color:#888;background:#f0f0ea;border-radius:10px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.browse-full{font-size:11px;color:#999;margin-bottom:6px}
.browse-def{font-size:13px;color:#333;line-height:1.85;margin-bottom:8px}
.browse-letters{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.browse-letter-row{display:flex;align-items:center;font-size:12px}
.browse-lc{font-size:15px;font-weight:700;color:#1D9E75;min-width:44px}
.browse-div{width:1px;height:13px;background:#ddd;margin:0 8px}
.browse-len{color:#888;min-width:120px}
.browse-lj{color:#444;font-weight:500}
.browse-memo{font-size:12px;color:#666;line-height:1.65;background:#f5f5f0;border-radius:6px;padding:6px 10px;border-left:3px solid #1D9E75}
.back-btn{font-size:12px;color:#888;background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px 11px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.back-btn:hover:not(:disabled){background:#f5f5f0;color:#444}
.back-btn:disabled{opacity:0.3;cursor:default}
.review-section{margin-top:1.5rem;text-align:left;border-top:1px solid #eee;padding-top:1.25rem}
.review-section-title{font-size:13px;font-weight:700;color:#791F1F;margin-bottom:0.9rem}
.review-card{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:1rem 1.2rem;margin-bottom:0.75rem}
.review-card-head{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.review-wrong-num{font-size:10px;color:#fff;background:#C0392B;border-radius:4px;padding:1px 6px;font-weight:700;flex-shrink:0}
.review-abbr-badge{font-size:16px;font-weight:700;color:#C0392B}
.review-full{font-size:11px;color:#999}
.review-your-ans{font-size:11px;color:#A32D2D;margin-bottom:6px}
.review-def{font-size:12px;color:#444;line-height:1.8;background:#fdf8f0;border-radius:6px;padding:6px 10px;margin-bottom:8px}
.review-letter-grid{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">
<div class="header">
  <button id="back-btn" class="back-btn" onclick="goBack()" disabled>← 前の問題</button>
  <span class="title">ITパスポート 語源クイズ</span>
  <span class="score-badge" id="score-display">正解: 0 / 0</span>
</div>
<div class="mode-select">
  <button class="mode-btn active" onclick="setMode('def-to-abbr',this)">説明 → 略語</button>
  <button class="mode-btn" onclick="setMode('abbr-to-def',this)">略語 → 説明</button>
  <button class="mode-btn" onclick="setMode('browse',this)">📚 一覧</button>
</div>
<div class="qcount-select" id="qcount-row">
  <span class="qcount-label">選択肢数：</span>
  <button class="qcount-btn" onclick="setQCount(3,this)">3択</button>
  <button class="qcount-btn active" onclick="setQCount(6,this)">6択</button>
  <button class="qcount-btn" onclick="setQCount(9,this)">9択</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progress" style="width:0%"></div></div>
<div id="quiz-area"></div>
</div>

<script>
const TERMS = [
  {abbr:"CEO",full:"Chief Executive Officer",
   letters:[{c:"C",en:"Chief",ja:"最高"},{c:"E",en:"Executive",ja:"経営（執行）"},{c:"O",en:"Officer",ja:"責任者"}],
   def:"最高経営責任者。会社の経営方針全体に責任を負う役職",
   memo:"C=最高、E=経営、O=責任者　→　最高「経営」責任者"},
  {abbr:"CFO",full:"Chief Financial Officer",
   letters:[{c:"C",en:"Chief",ja:"最高"},{c:"F",en:"Financial",ja:"財務"},{c:"O",en:"Officer",ja:"責任者"}],
   def:"企業の財務部門を統括し、財務戦略の立案と実施に責任を負う役職",
   memo:"C=最高、F=財務、O=責任者　→　最高「財務」責任者"},
  {abbr:"CTO",full:"Chief Technology Officer",
   letters:[{c:"C",en:"Chief",ja:"最高"},{c:"T",en:"Technology",ja:"技術"},{c:"O",en:"Officer",ja:"責任者"}],
   def:"企業の技術部門を統括し、技術研究の立案と実施の責任を負う役職",
   memo:"C=最高、T=技術、O=責任者　→　最高「技術」責任者"},
  {abbr:"CIO",full:"Chief Information Officer",
   letters:[{c:"C",en:"Chief",ja:"最高"},{c:"I",en:"Information",ja:"情報"},{c:"O",en:"Officer",ja:"責任者"}],
   def:"IT化の方向性を考え情報戦略を立案し、IT投資計画策定に最終的な責任を持つ役職",
   memo:"C=最高、I=情報、O=責任者　→　最高「情報」責任者"},
  {abbr:"COO",full:"Chief Operating Officer",
   letters:[{c:"C",en:"Chief",ja:"最高"},{c:"O",en:"Operating",ja:"執行"},{c:"O",en:"Officer",ja:"責任者"}],
   def:"最高執行責任者。会社の実務に対して責任を負う役職",
   memo:"C=最高、O=執行、O=責任者　→　最高「執行」責任者"},
  {abbr:"KPI",full:"Key Performance Indicator",
   letters:[{c:"K",en:"Key",ja:"重要な・鍵となる"},{c:"P",en:"Performance",ja:"業績評価"},{c:"I",en:"Indicator",ja:"指標"}],
   def:"目標達成のために行う活動の実施状況をモニタリングするための指標。重要業績評価指標",
   memo:"K=重要、P=業績、I=指標　→　先生の解説通り！「重要な業績評価指標」"},
  {abbr:"KGI",full:"Key Goal Indicator",
   letters:[{c:"K",en:"Key",ja:"重要な・鍵となる"},{c:"G",en:"Goal",ja:"目標"},{c:"I",en:"Indicator",ja:"指標"}],
   def:"達成すべき到達目標を定量的・測定可能な数値で表したもの。重要目標達成指標",
   memo:"KPIとの違い：G=Goal（目標そのもの）。KGIが最終ゴール、KPIは途中指標"},
  {abbr:"CSF",full:"Critical Success Factors",
   letters:[{c:"C",en:"Critical",ja:"重要な・致命的な"},{c:"S",en:"Success",ja:"成功"},{c:"F",en:"Factors",ja:"要因"}],
   def:"経営目標を達成するために重要な影響を及ぼす成功因子",
   memo:"C=重要、S=成功、F=要因　→　「重要成功要因」"},
  {abbr:"ROI",full:"Return On Investment",
   letters:[{c:"R",en:"Return",ja:"利益・リターン"},{c:"O",en:"On",ja:"〜に対する"},{c:"I",en:"Investment",ja:"投資"}],
   def:"投資利益率。利益÷投資資本×100",
   memo:"R=リターン、O=on、I=投資　→　「投資に対するリターン」"},
  {abbr:"ROA",full:"Return On Assets",
   letters:[{c:"R",en:"Return",ja:"利益・リターン"},{c:"O",en:"On",ja:"〜に対する"},{c:"A",en:"Assets",ja:"総資産"}],
   def:"総資産利益率。当期純利益÷総資産×100",
   memo:"R=リターン、A=資産（アセット）　→　「資産に対するリターン」"},
  {abbr:"ROE",full:"Return On Equity",
   letters:[{c:"R",en:"Return",ja:"利益・リターン"},{c:"O",en:"On",ja:"〜に対する"},{c:"E",en:"Equity",ja:"自己資本"}],
   def:"自己資本利益率。純利益÷自己資本（純資産）",
   memo:"R=リターン、E=エクイティ（自己資本）　→　「自己資本に対するリターン」"},
  {abbr:"RFP",full:"Request For Proposal",
   letters:[{c:"R",en:"Request",ja:"要求・依頼"},{c:"F",en:"For",ja:"〜のための"},{c:"P",en:"Proposal",ja:"提案書"}],
   def:"ベンダー企業にシステムの導入目的や機能概要などを示し、提案書の提出を求めるもの",
   memo:"R=リクエスト、P=プロポーザル（提案）　→　「提案を求める」"},
  {abbr:"RFI",full:"Request For Information",
   letters:[{c:"R",en:"Request",ja:"要求・依頼"},{c:"F",en:"For",ja:"〜のための"},{c:"I",en:"Information",ja:"情報"}],
   def:"ベンダー企業から情報収集を行い、システムの技術的な課題や実現性を把握するもの",
   memo:"RFPの前段階。I=情報収集　→　まず情報集め（RFI）、次に提案依頼（RFP）"},
  {abbr:"RPA",full:"Robotic Process Automation",
   letters:[{c:"R",en:"Robotic",ja:"ロボット的な"},{c:"P",en:"Process",ja:"プロセス"},{c:"A",en:"Automation",ja:"自動化"}],
   def:"人間が手作業で行っていた定型的なPC作業をソフトウェアロボットにより自動化する仕組み",
   memo:"R=ロボット、A=オートメーション（自動化）　→　ロボットがPCを自動操作"},
  {abbr:"BPR",full:"Business Process Reengineering",
   letters:[{c:"B",en:"Business",ja:"ビジネス"},{c:"P",en:"Process",ja:"プロセス"},{c:"R",en:"Reengineering",ja:"再設計"}],
   def:"既存の組織やビジネスルールを抜本的に見直し、業務フロー・情報システムを再設計する手法",
   memo:"R=リエンジニアリング（根本的な再設計）　→　「抜本的」がキーワード"},
  {abbr:"BPO",full:"Business Process Outsourcing",
   letters:[{c:"B",en:"Business",ja:"ビジネス"},{c:"P",en:"Process",ja:"プロセス"},{c:"O",en:"Outsourcing",ja:"外部委託"}],
   def:"自社のコアビジネス以外の業務の全部または一部を外部の業者に委託すること",
   memo:"O=アウトソーシング（外部委託）　→　業務を外に出す"},
  {abbr:"BPMN",full:"Business Process Model and Notation",
   letters:[{c:"B",en:"Business",ja:"ビジネス"},{c:"P",en:"Process",ja:"プロセス"},{c:"M",en:"Model",ja:"モデル"},{c:"N",en:"Notation",ja:"表記法"}],
   def:"11個の基本要素を用いてビジネスプロセスをワークフローとして視覚的に表現するための手法",
   memo:"N=ノーテーション（表記法）　→　業務の流れを図で表す"},
  {abbr:"MRP",full:"Material Requirements Planning",
   letters:[{c:"M",en:"Material",ja:"資材"},{c:"R",en:"Requirements",ja:"所要量"},{c:"P",en:"Planning",ja:"計画"}],
   def:"部品表と生産計画をもとに必要な資材の所要量を求め、在庫・発注・納入管理を支援するシステム",
   memo:"M=マテリアル（資材）　→　「資材所要量計画」とそのまま訳せる"},
  {abbr:"MOT",full:"Management of Technology",
   letters:[{c:"M",en:"Management",ja:"経営・管理"},{c:"O",en:"of",ja:"〜の"},{c:"T",en:"Technology",ja:"技術"}],
   def:"技術開発の成果によって事業利益を獲得することを目的とした経営手法。技術経営ともいわれる",
   memo:"M=マネジメント、T=テクノロジー　→　「技術経営」"},
  {abbr:"FAQ",full:"Frequently Asked Questions",
   letters:[{c:"F",en:"Frequently",ja:"頻繁に"},{c:"A",en:"Asked",ja:"質問される"},{c:"Q",en:"Questions",ja:"質問"}],
   def:"何回も繰り返し質問される項目とその質問への回答をまとめたコンテンツ",
   memo:"F=フリークエントリー（頻繁）　→　「よくある質問」"},
  {abbr:"SLA",full:"Service Level Agreement",
   letters:[{c:"S",en:"Service",ja:"サービス"},{c:"L",en:"Level",ja:"レベル"},{c:"A",en:"Agreement",ja:"合意・契約"}],
   def:"提供者と顧客の間でサービスの品質に関して結ぶ契約。ペナルティ事項も盛り込まれる",
   memo:"A=アグリーメント（合意）　→　サービス品質の「合意書」"},
  {abbr:"SLM",full:"Service Level Management",
   letters:[{c:"S",en:"Service",ja:"サービス"},{c:"L",en:"Level",ja:"レベル"},{c:"M",en:"Management",ja:"管理"}],
   def:"顧客要件を満たすITサービスの提供を実現し、品質の継続的な改善に必要なプロセスを構築する管理活動",
   memo:"SLAが「契約」、SLMが「管理活動」　→　SLAを守るための管理がSLM"},
  {abbr:"ISMS",full:"Information Security Management System",
   letters:[{c:"I",en:"Information",ja:"情報"},{c:"S",en:"Security",ja:"セキュリティ"},{c:"M",en:"Management",ja:"管理"},{c:"S",en:"System",ja:"システム"}],
   def:"情報の機密性・完全性・可用性を適切に管理する体制を構築・運用・改善する情報セキュリティマネジメントシステム",
   memo:"I=情報、S=セキュリティ、M=マネジメント　→　「情報セキュリティ管理システム」"},
  {abbr:"IDS",full:"Intrusion Detection System",
   letters:[{c:"I",en:"Intrusion",ja:"侵入"},{c:"D",en:"Detection",ja:"検知"},{c:"S",en:"System",ja:"システム"}],
   def:"ネットワークに対する不正アクセスやその予兆を検知し、管理者に通知するシステム",
   memo:"D=ディテクション（検知のみ）　→　IDSは「検知して通知」、IPSは「検知＋ブロック」"},
  {abbr:"IPS",full:"Intrusion Prevention System",
   letters:[{c:"I",en:"Intrusion",ja:"侵入"},{c:"P",en:"Prevention",ja:"防止・遮断"},{c:"S",en:"System",ja:"システム"}],
   def:"不正・異常な通信を検知して管理者に通知するとともに、その通信をブロックするシステム",
   memo:"P=プリベンション（防止）　→　IDSとの違い：IPSは「ブロックまでする」"},
  {abbr:"ITIL",full:"IT Infrastructure Library",
   letters:[{c:"IT",en:"Information Technology",ja:"情報技術"},{c:"I",en:"Infrastructure",ja:"インフラ"},{c:"L",en:"Library",ja:"ライブラリ（知識集）"}],
   def:"ITサービスマネジメントのベストプラクティスを集めたフレームワーク",

  'ネットワーク':['RFID','PSK','SSID','VoIP','MVNO','PLC'],
  '信頼性・継続':['MTBF','MTBSI','MTRS','UPS','BCP'],

TERMS.forEach(t=>{
  for(const[cat,abbrs]of Object.entries(CATS)){
    if(abbrs.includes(t.abbr)){t.cat=cat;break;}
  }
  if(!t.cat)t.cat='その他';
});

let mode='def-to-abbr', shuffled=[], current=0, correct=0, answered=false, currentOpts=[], history=[], navIndex=-1, qCount=6;

function setQCount(n,btn){
  qCount=n;
  document.querySelectorAll('.qcount-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(mode!=='browse')startQuiz();
}
function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(m==='browse'){
    document.getElementById('progress').parentElement.style.display='none';
    document.getElementById('score-display').style.display='none';
    document.getElementById('back-btn').style.display='none';
    document.getElementById('qcount-row').style.display='none';
    renderBrowse();
  } else {
    document.getElementById('progress').parentElement.style.display='';
    document.getElementById('score-display').style.display='';
    document.getElementById('back-btn').style.display='';
    document.getElementById('qcount-row').style.display='';
    startQuiz();
  }
}
function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function renderBrowse(filterCat){
  filterCat=filterCat||'すべて';
  const catNames=['すべて',...Object.keys(CATS)];
  const filtered=filterCat==='すべて'?TERMS:TERMS.filter(t=>t.cat===filterCat);
  const catBtns=catNames.map(c=>`
    <button class="cat-btn${c===filterCat?' active':''}" onclick="renderBrowse('${c}')">${c}${c==='すべて'?'':' ('+( c==='すべて'?TERMS.length:TERMS.filter(t=>t.cat===c).length)+')'}</button>
  `).join('');
  const cards=filtered.map(t=>{
    const defHl=hlDef(t.def,t.letters);
    const lRows=t.letters.map(l=>`
      <div class="browse-letter-row">
        <span class="browse-lc">${l.c}</span>
        <span class="browse-div"></span>
        <span class="browse-len">${hlEn(l.c,l.en)}</span>
        <span class="browse-div"></span>
        <span class="browse-lj">${l.ja}</span>
      </div>`).join('');
    const showTag=filterCat==='すべて';
    return `<div class="browse-card">
      <div class="browse-card-top">
        <span class="browse-abbr">${t.abbr}</span>
        ${showTag?`<span class="browse-cat-tag">${t.cat}</span>`:''}
      </div>
      <div class="browse-full">${t.full}</div>
      <div class="browse-def">${defHl}</div>
      <div class="browse-letters">${lRows}</div>
      <div class="browse-memo">💡 ${t.memo}</div>
    </div>`;
  }).join('');
  document.getElementById('quiz-area').innerHTML=`
    <div class="cat-filter">${catBtns}</div>
    ${cards}
  `;
}
function startQuiz(){
  shuffled=shuffle(TERMS);
  current=0;correct=0;answered=false;history=[];navIndex=-1;
  updateScore();updateProgress();updateBackBtn();renderQuestion();
}
function updateScore(){document.getElementById('score-display').textContent=`正解: ${correct} / ${current}`;}
function updateProgress(){
  let pct=shuffled.length?(current/shuffled.length)*100:0;
  document.getElementById('progress').style.width=pct+'%';
}

function getSimilar(item, n) {
  const others = TERMS.filter(t => t.abbr !== item.abbr);
  const scored = others.map(t => {
    let score = 0;
    // 頭文字が同じ（最重要: CEO vs CFO, ROI vs ROA など）
    if (t.abbr[0] === item.abbr[0]) score += 5;
    // 2文字目が同じ
    if (t.abbr.length > 1 && item.abbr.length > 1 && t.abbr[1] === item.abbr[1]) score += 4;
    // 3文字目が同じ
    if (t.abbr.length > 2 && item.abbr.length > 2 && t.abbr[2] === item.abbr[2]) score += 2;
    // 略語の長さが同じ
    if (t.abbr.length === item.abbr.length) score += 2;
    // 末尾の文字が同じ
    if (t.abbr.slice(-1) === item.abbr.slice(-1)) score += 1;
    // ランダムノイズで毎回少し変化させる
    score += Math.random() * 2;
    return { term: t, score };
  });
  scored.sort((a, b) => b.score - a.score);
  // 上位候補からシャッフルして取得（全部が最高スコアにならないよう上位n+4から選ぶ）
  return shuffle(scored.slice(0, n + 4)).slice(0, n).map(s => s.term);
}
function renderQuestion(savedItem, savedOpts, savedQNum){
  if(current>=shuffled.length){renderResult();return;}
  answered=false;
  let item=savedItem||shuffled[current];
  let opts=savedOpts?[...savedOpts]:shuffle([item,...getSimilar(item,qCount-1)]);
  currentOpts=[...opts];
  let displayNum=savedQNum||(current+1);
  // 選択肢数に応じてグリッド列数を変える（略語モードのみ複数列）
  let cols=mode==='def-to-abbr'?(qCount<=3?'1fr 1fr':qCount<=6?'1fr 1fr 1fr':'1fr 1fr 1fr'):'1fr';
  let gridStyle=`display:grid;grid-template-columns:${cols};gap:8px;margin-bottom:0.75rem`;
  document.getElementById('quiz-area').innerHTML=`
    <div class="question-card">
      <div class="q-num">問題 ${displayNum} / ${shuffled.length}</div>
      <div class="q-text">${mode==='def-to-abbr'?item.def:'<span style="font-size:24px;font-weight:700;letter-spacing:3px">'+item.abbr+'</span>'}</div>
    </div>
    <div id="opts" style="${gridStyle}">
      ${opts.map(o=>{
        let label=mode==='def-to-abbr'
          ?`<span style="font-size:17px;font-weight:700;letter-spacing:2px">${o.abbr}</span>`
          :`<span style="font-size:12px;line-height:1.5">${o.def}</span>`;
        return `<button class="opt-btn" onclick="answer(this,'${o.abbr}','${item.abbr}')">${label}</button>`;
      }).join('')}
    </div>
    <div class="exp-card" id="exp-card"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">次の問題 →</button>
    <div id="other-opts"></div>
  `;
}
function answer(btn,chosen,correctAbbr){
  if(answered)return;
  answered=true;
  let isOK=chosen===correctAbbr;
  if(isOK)correct++;
  history.push({
    term:shuffled[current], chosen, correctAbbr,
    opts:[...currentOpts], isOK, qNum:current+1
  });
  current++;
  navIndex=-1; // 解答したら最前線に戻す
  updateScore();updateProgress();updateBackBtn();
  revealAnswer(chosen,correctAbbr,isOK);
}
// 選択肢のハイライト・解説表示をまとめた関数（通常解答時・戻る時の両方で使用）
function revealAnswer(chosen,correctAbbr,isOK){
  answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    const span=b.querySelector('span');
    if(!span)return;
    const val=span.textContent.trim();
    if(mode==='def-to-abbr'){
      if(val===correctAbbr){b.classList.add((val===chosen&&isOK)?'correct':'reveal');}
      if(val===chosen&&!isOK)b.classList.add('wrong');
    } else {
      const match=TERMS.find(t=>t.def===val);
      if(match&&match.abbr===correctAbbr){b.classList.add((match.abbr===chosen&&isOK)?'correct':'reveal');}
      if(match&&match.abbr===chosen&&!isOK)b.classList.add('wrong');
    }
  });
  const term=TERMS.find(t=>t.abbr===correctAbbr);
  showExp(term,isOK);
  document.getElementById('next-btn').style.display='block';
  showOtherOpts(chosen,correctAbbr);
}
// 英語の頭文字を赤くハイライト: "C" → "<hl>C</hl>hief"
function hlEn(c,en){
  const cLen=c.replace(/[\/\s]/g,'').length;
  const words=en.split(/\s+/);
  const R=s=>`<span class="hl-red">${s}</span>`;
  if(words.length>=cLen){
    return words.map((w,i)=>i<cLen?R(w[0])+w.slice(1):w).join(' ');
  } else {
    return R(en.slice(0,cLen))+en.slice(cLen);
  }
}
// 定義文中の日本語キーワードを赤くハイライト
function hlDef(def,letters){
  let result=def;
  const done=new Set();
  letters.forEach(l=>{
    // 例: "経営（執行）" → ["経営","執行"] から試す
    const candidates=l.ja.split(/[（）・〜→\s、]/).map(s=>s.trim()).filter(s=>s.length>=2);
    for(const kw of candidates){
      if(!done.has(kw)&&result.includes(kw)){
        done.add(kw);
        result=result.replace(kw,`<span class="hl-red">${kw}</span>`);
        break;
      }
    }
  });
  return result;
}
function showExp(term,isOK){
  let card=document.getElementById('exp-card');
  card.style.display='block';
  // 問題文ブロック
  let qHTML='';
  if(mode==='def-to-abbr'){
    // 定義文中のキーワードを赤く
    const defHl=hlDef(term.def,term.letters);
    qHTML=`<div class="exp-qblock">
      <div class="exp-qblock-label">問題文（定義）</div>
      <div class="exp-qblock-text">${defHl}</div>
    </div>`;
  } else {
    // 略語の各大文字を赤く
    const abbrHl=term.abbr.split('').map(ch=>/[A-Z0-9]/.test(ch)?`<span class="hl-red">${ch}</span>`:ch).join('');
    qHTML=`<div class="exp-qblock">
      <div class="exp-qblock-label">問題文（略語）</div>
      <div class="exp-qblock-text" style="font-size:26px;font-weight:700;letter-spacing:4px;line-height:1.3">${abbrHl}</div>
    </div>`;
  }
  // 文字分解グリッド（英語頭文字を赤く）
  let lHTML=term.letters.map(l=>`
    <div class="letter-row">
      <span class="letter-char">${l.c}</span>
      <span class="divider"></span>
      <span class="letter-en">${hlEn(l.c,l.en)}</span>
      <span class="divider"></span>
      <span class="letter-ja">${l.ja}</span>
    </div>
  `).join('');
  card.innerHTML=`
    ${qHTML}
    <div class="result-label ${isOK?'ok':'ng'}">${isOK?'✓ 正解！':'✗ 不正解'} — ${term.abbr}（${term.full}）</div>
    <div class="letter-grid">${lHTML}</div>
    <div class="memo-box">💡 ${term.memo}</div>
  `;
}
// 選択肢のミニ解説カードを生成
function miniCard(term, type){
  const isWrong=type==='wrong';
  // 問題文（定義またはハイライト付き略語）
  let qLine='';
  if(mode==='def-to-abbr'){
    const defHl=hlDef(term.def,term.letters);
    qLine=`<div class="mini-def">${defHl}</div>`;
  } else {
    const abbrHl=term.abbr.split('').map(ch=>/[A-Z0-9]/.test(ch)?`<span class="hl-red">${ch}</span>`:ch).join('');
    qLine=`<div class="mini-def" style="font-size:18px;font-weight:700;letter-spacing:3px">${abbrHl}</div>`;
  }
  // コンパクトな文字分解: "C=最高 / E=経営 / O=責任者"
  const letterLine=term.letters.map(l=>{
    const jaShort=l.ja.split(/[（・〜→]/)[0].trim();
    return `<span class="mini-letter-c">${l.c}</span>=<span>${jaShort}</span>`;
  }).join('<span class="mini-sep"> / </span>');
  return `<div class="mini-card${isWrong?' wrong-chosen':''}">
    ${isWrong?'<div class="mini-type-label">❌ あなたが選んだ答え</div>':''}
    <div class="mini-header">
      <span class="mini-abbr" style="color:${isWrong?'#A32D2D':'#1D9E75'}">${term.abbr}</span>
      <span class="mini-full">${term.full}</span>
    </div>
    ${qLine}
    <div class="mini-letters">${letterLine}</div>
    <div class="mini-memo">💡 ${term.memo}</div>
  </div>`;
}
// 次の問題ボタンの下に間違い選択肢・その他選択肢の解説を表示
function showOtherOpts(chosen, correctAbbr){
  const container=document.getElementById('other-opts');
  if(!container)return;
  const isWrong=chosen!==correctAbbr;
  let html='';
  // 間違えて選んだ選択肢の解説
  if(isWrong){
    const wrongTerm=TERMS.find(t=>t.abbr===chosen);
    if(wrongTerm) html+=miniCard(wrongTerm,'wrong');
  }
  // 正解・間違い選択肢を除いた残りの選択肢の解説
  const others=currentOpts.filter(t=>t.abbr!==correctAbbr&&t.abbr!==chosen);
  if(others.length>0){
    html+=`<div class="other-section-label">📚 その他の選択肢（${others.length}件）</div>`;
    html+=others.map(t=>miniCard(t,'other')).join('');
  }
  container.innerHTML=html;
}
function nextQ(){
  if(navIndex===-1){
    // 最前線：次の未解答問題へ
    renderQuestion();
  } else if(navIndex<history.length-1){
    // 履歴内を前に進む
    navIndex++;
    showHistoryItem(navIndex);
  } else {
    // 履歴の最後 → 最前線の未解答問題へ
    navIndex=-1;
    renderQuestion();
  }
  updateBackBtn();
}
function updateBackBtn(){
  const btn=document.getElementById('back-btn');
  if(!btn)return;
  // 履歴がない、または履歴の先頭にいる場合はdisabled
  btn.disabled=(navIndex===0)||(navIndex===-1&&history.length===0);
}
function showHistoryItem(idx){
  const h=history[idx];
  renderQuestion(h.term,h.opts,h.qNum);
  revealAnswer(h.chosen,h.correctAbbr,h.isOK);
}
function goBack(){
  if(navIndex===-1){
    // 最前線から1つ前の履歴へ
    if(history.length===0)return;
    navIndex=history.length-1;
  } else if(navIndex>0){
    navIndex--;
  } else {
    return; // これ以上戻れない
  }
  updateBackBtn();
  showHistoryItem(navIndex);
}
function renderResult(){
  const pct=Math.round((correct/shuffled.length)*100);
  const msg=pct>=80?'素晴らしい！合格圏内です 🎉':pct>=60?'もう少し！復習しよう 📚':'基礎から復習しよう 🔥';
  const wrongEntries=history.filter(h=>!h.isOK);
  // 間違い一覧カード生成
  let reviewHTML='';
  if(wrongEntries.length===0){
    reviewHTML=`<div style="margin-top:1rem;font-size:13px;color:#1D9E75;font-weight:600">✓ 全問正解！パーフェクトです🎉</div>`;
  } else {
    const cards=wrongEntries.map((h,i)=>{
      const t=h.term;
      const defHl=hlDef(t.def,t.letters);
      const chosenTerm=TERMS.find(x=>x.abbr===h.chosen);
      const yourAns=chosenTerm?`あなたの解答：${h.chosen}（${chosenTerm.full}）`:`あなたの解答：${h.chosen}`;
      const lHTML=t.letters.map(l=>`
        <div class="letter-row">
          <span class="letter-char" style="font-size:17px;min-width:44px">${l.c}</span>
          <span class="divider"></span>
          <span class="letter-en" style="font-size:12px;min-width:130px">${hlEn(l.c,l.en)}</span>
          <span class="divider"></span>
          <span class="letter-ja" style="font-size:13px">${l.ja}</span>
        </div>`).join('');
      return `<div class="review-card">
        <div class="review-card-head">
          <span class="review-wrong-num">${i+1}問目</span>
          <span class="review-abbr-badge">${t.abbr}</span>
          <span class="review-full">${t.full}</span>
        </div>
        <div class="review-your-ans">❌ ${yourAns}</div>
        <div class="review-def">${defHl}</div>
        <div class="review-letter-grid">${lHTML}</div>
        <div class="memo-box">💡 ${t.memo}</div>
      </div>`;
    }).join('');
    reviewHTML=`<div class="review-section">
      <div class="review-section-title">❌ 間違えた問題（${wrongEntries.length}件）</div>
      ${cards}
    </div>`;
  }
  document.getElementById('quiz-area').innerHTML=`
    <div class="result-card">
      <div class="result-score">${correct}/${shuffled.length}</div>
      <div class="result-msg">正答率 ${pct}%　— ${msg}</div>
      <button class="restart-btn" onclick="startQuiz()">もう一度挑戦する</button>
      ${reviewHTML}
    </div>
  `;
}
startQuiz();
</script>
