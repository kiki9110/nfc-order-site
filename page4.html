<style>
@import url('https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root{
  --ink:#2c2740; --paper:#fffdf7; --cream:#fff4ea;
  --accent:#ff7a59; --accent-press:#e85f3f; --accent2:#f2b134;
  --muted:#8a8398; --border:#f0e3d6;
  --ok:#2e9e5b; --err:#e0392b;
  --pop:'Mochiy Pop One',sans-serif;--surface:#fff;--sel:#fff8f5;--card-sh:0 5px 0 rgba(124,107,219,.08);--btn-pop:0 3px 0 rgba(0,0,0,.05);--cta-sh:0 4px 0 var(--accent-press);--cta-shA:0 1px 0 var(--accent-press);--topbar:linear-gradient(90deg,#ff7a59,#ff9d6b);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(255,122,89,.10) 2px,transparent 2px);background-size:28px 28px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 24px;}
.logo-block{text-align:center;margin-bottom:36px;}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border:2.5px solid var(--accent);border-radius:16px;margin-bottom:14px;background:var(--surface);box-shadow:0 4px 0 rgba(255,122,89,.18);}
.logo-mark svg{width:28px;height:28px;}
.logo-name{font-family:var(--pop);font-size:22px;font-weight:400;letter-spacing:.04em;}
.logo-sub{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:.05em;}
.card{width:100%;max-width:440px;background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:28px 24px;box-shadow:var(--card-sh);}
.card-title{font-family:var(--pop);font-size:17px;font-weight:400;margin-bottom:8px;}
.card-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:22px;}
.field{margin-bottom:18px;}
.field-label{display:block;font-size:13px;font-weight:700;margin-bottom:8px;}
.field-label .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;margin-right:8px;}
.field input{width:100%;padding:13px 14px;border:2px solid var(--border);border-radius:12px;background:var(--surface);color:var(--ink);font-size:15px;font-family:inherit;transition:border-color .2s,box-shadow .2s;}
.field input::placeholder{color:#c9c2bd;}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,122,89,.18);}
.field-hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6;}
.btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:400;font-family:var(--pop);cursor:pointer;transition:transform .1s,box-shadow .1s,filter .15s;margin-top:6px;box-shadow:var(--cta-sh);}
.btn:hover{filter:brightness(1.04);}
.btn:active{transform:translateY(4px);box-shadow:var(--cta-shA);}
.btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:var(--cta-sh);}
/* 結果メッセージ */
.result{margin-top:20px;padding:16px;border-radius:14px;font-size:13px;line-height:1.7;display:none;}
.result.show{display:block;}
.result.ok{background:#eaf7ee;border:1.5px solid var(--ok);}
.result.err{background:#fdeceb;border:1.5px solid var(--err);}
.result-title{font-weight:700;margin-bottom:6px;}
.result-list{margin-top:8px;}
.result-list span{display:inline-block;background:var(--cream);padding:3px 10px;border-radius:20px;font-size:12px;margin:3px 4px 3px 0;}
.footer{position:relative;z-index:1;text-align:center;padding:20px;font-size:11px;color:var(--muted);letter-spacing:.04em;}
.back-link{color:var(--muted);font-size:12px;text-decoration:none;margin-top:18px;display:inline-block;}
.back-link:hover{color:var(--accent);}

/* テーマ切替ボタン */
.topbar{display:flex;align-items:center;justify-content:space-between;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);background:rgba(255,255,255,.2);color:#fff;cursor:pointer;padding:0;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);transition:transform .12s,background .2s;flex-shrink:0;}
.theme-toggle:hover{transform:scale(1.08);}
.theme-toggle:active{transform:scale(.93);}
.theme-toggle svg{width:18px;height:18px;display:block;}
.theme-toggle .ic-sun{display:none;}
:root[data-theme="night"] .theme-toggle .ic-sun{display:block;}
:root[data-theme="night"] .theme-toggle .ic-moon{display:none;}

:root[data-theme="night"] .result.err{background:rgba(255,107,94,.14);}
:root[data-theme="night"] .result-list span{background:rgba(255,255,255,.10);}

.nav-toggle:hover{transform:scale(1.08);}.nav-toggle:active{transform:scale(.93);}

.nav-overlay.open{opacity:1;pointer-events:auto;}
.nav-drawer{position:fixed;top:0;right:0;height:100%;width:min(84vw,330px);background:#fff;color:var(--ink);box-shadow:-12px 0 40px -12px rgba(0,0,0,.4);transform:translateX(102%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:2000;display:flex;flex-direction:column;overflow-y:auto;}

.nav-dhead{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--border);}
.nav-dtitle{font-family:var(--pop);font-size:16px;color:var(--ink);}
.nav-close{width:34px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.nav-close:hover{background:var(--cream);}.nav-close svg{width:18px;height:18px;}
.nav-link{display:flex;align-items:center;gap:12px;padding:15px 20px;color:var(--ink);text-decoration:none;font-size:15px;font-weight:700;border-bottom:1px solid var(--border);transition:background .15s;}
.nav-link:hover{background:var(--cream);}.nav-link:active{background:var(--sel);}
.nav-link.cur{color:var(--accent);background:var(--sel);}
.nav-ic{font-size:18px;width:24px;text-align:center;}
.float-cluster{position:fixed;top:14px;right:14px;z-index:1000;display:flex;gap:8px;align-items:center;}
.float-cluster .theme-toggle,.float-cluster .nav-toggle{border-color:rgba(44,39,64,.16);background:var(--surface);color:var(--accent);box-shadow:0 4px 14px -5px rgba(0,0,0,.25);-webkit-backdrop-filter:none;backdrop-filter:none;}
:root[data-theme="night"] .float-cluster .theme-toggle,:root[data-theme="night"] .float-cluster .nav-toggle{background:rgba(255,255,255,.08);color:#ffce9e;box-shadow:0 0 16px -4px rgba(255,131,88,.45);}
</style>
<script>
(function(){var K='bukiTheme',mq=window.matchMedia('(prefers-color-scheme: dark)');
function eff(){var s=null;try{s=localStorage.getItem(K)}catch(e){}return(s==='light'||s==='night')?s:(mq.matches?'night':'light');}
function set(t){document.documentElement.setAttribute('data-theme',t);}
set(eff());
function om(){var s=null;try{s=localStorage.getItem(K)}catch(e){}if(s!=='light'&&s!=='night')set(mq.matches?'night':'light');}
if(mq.addEventListener)mq.addEventListener('change',om);else if(mq.addListener)mq.addListener(om);
function w(){var b=document.getElementById('themeToggle');if(!b)return;b.addEventListener('click',function(){var c=document.documentElement.getAttribute('data-theme')||eff();var n=(c==='night')?'light':'night';try{localStorage.setItem(K,n)}catch(e){}set(n);});}
if(document.readyState!=='loading')w();else document.addEventListener('DOMContentLoaded',w);})();
</script>

<script>
// Worker（バックエンド）のURL
const WORKER_ORIGIN = sessionStorage.getItem('workerOrigin') || 'https://buki-booth.com';

// オプション識別子 → 表示名
const OPT_NAMES = { nfc: 'NFCタグ', double: '両面印刷', diecut: 'ダイカット' };

function showResult(type, html) {
  const r = document.getElementById('result');
  r.className = 'result show ' + type;
  r.innerHTML = html;
}

async function applyOption() {
  const bodyOrderId = document.getElementById('bodyOrder').value.trim();
  const optOrderId  = document.getElementById('optOrder').value.trim();
  const btn = document.getElementById('applyBtn');

  // 入力チェック
  if (!bodyOrderId || !optOrderId) {
    showResult('err', '<div class="result-title">⚠ 入力エラー</div>2つの注文番号を両方入力してください。');
    return;
  }

  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '処理中...';

  try {
    const res = await fetch(WORKER_ORIGIN + '/api/opt-apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bodyOrderId, optOrderId }),
    });
    const d = await res.json();

    if (d.ok) {
      // 適用されたオプションを表示
      const applied = d.applied || {};
      const labels = Object.keys(applied)
        .filter(function(k){ return applied[k]; })
        .map(function(k){ return '<span>' + (OPT_NAMES[k] || k) + '</span>'; });
      let listHtml = '';
      if (labels.length) listHtml += '<div class="result-list">' + labels.join('') + '</div>';
      if (d.addonAdded > 0) listHtml += '<div class="result-list"><span>2枚目以降 ' + d.addonAdded + '枚 追加</span></div>';
      if (!labels.length && !d.addonAdded) listHtml = '<div style="margin-top:6px;color:var(--muted);">（このオプション注文に有効な項目がありませんでした）</div>';

      showResult('ok',
        '<div class="result-title">✓ 紐付けが完了しました</div>' +
        'キーホルダー注文 <strong>' + bodyOrderId + '</strong> に以下を追加しました：' +
        listHtml +
        '<div style="margin-top:10px;font-size:12px;color:var(--muted);">注文ページで追加したオプションが選べるようになります。</div>'
      );
      // 成功したら入力を消してボタンを無効化（二重適用防止）
      document.getElementById('optOrder').value = '';
    } else {
      showResult('err', '<div class="result-title">⚠ 紐付けできませんでした</div>' + (d.error || '不明なエラーが発生しました。'));
    }
  } catch (e) {
    showResult('err', '<div class="result-title">⚠ 通信エラー</div>電波状況をご確認のうえ、もう一度お試しください。');
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

// Enterキーで実行
['bodyOrder','optOrder'].forEach(function(id){
  document.getElementById(id).addEventListener('keydown', function(e){
    if (e.key === 'Enter') applyOption();
  });
});
</script>

(function(){var t=document.getElementById('navToggle'),d=document.getElementById('navDrawer'),o=document.getElementById('navOverlay'),c=document.getElementById('navClose');if(!t||!d)return;function op(){d.classList.add('open');if(o)o.classList.add('open');d.setAttribute('aria-hidden','false');}function cl(){d.classList.remove('open');if(o)o.classList.remove('open');d.setAttribute('aria-hidden','true');}t.addEventListener('click',op);if(c)c.addEventListener('click',cl);if(o)o.addEventListener('click',cl);document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();

  const PAGE_KEY = 'page4';
  const WORKER_ORIGIN = sessionStorage.getItem('workerOrigin') || 'https://buki-booth.com';
  const BYPASS_KEY = 'buki_maint_bypass_pw';

  function setSubmitBlocked(blocked) { /* このページには送信ボタンなし */ }

    if (document.getElementById('maint-bypass-modal')) return;
    const wrap = document.createElement('div');
    wrap.id = 'maint-bypass-modal';
    wrap.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:24px;';
    wrap.innerHTML =
      '<div style="background:#fff;border-radius:14px;padding:24px;max-width:320px;width:100%;">' +
        '<div style="font-weight:700;margin-bottom:12px;">管理者パスワード</div>' +
        '<input type="password" id="maint-bypass-input" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-bottom:8px;">' +
        '<div id="maint-bypass-err" style="display:none;color:#e84040;font-size:12px;margin-bottom:8px;">パスワードが違います</div>' +
        '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
          '<button id="maint-bypass-cancel" style="padding:8px 14px;">キャンセル</button>' +
          '<button id="maint-bypass-ok" style="padding:8px 14px;">確認</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(wrap);

    document.getElementById('maint-bypass-cancel').onclick = function () { wrap.remove(); };
    document.getElementById('maint-bypass-ok').onclick = async function () {
      const pw = document.getElementById('maint-bypass-input').value;
      try {
        const r = await fetch(WORKER_ORIGIN + '/api/maintenance-bypass-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const d = await r.json();
        if (d.ok) {
          localStorage.setItem(BYPASS_KEY, pw);
          wrap.remove();
          onSuccess();
        } else {
          document.getElementById('maint-bypass-err').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('maint-bypass-err').style.display = 'block';
      }
    };
  }

  async function checkBypassStored() {
    const saved = localStorage.getItem(BYPASS_KEY);
    if (!saved) return false;
    try {
      const r = await fetch(WORKER_ORIGIN + '/api/maintenance-bypass-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: saved }),
      });
      const d = await r.json();
      if (!d.ok) localStorage.removeItem(BYPASS_KEY);
      return !!d.ok;
    } catch (e) {
      return false;
    }
  }

  (async function initMaintenanceCheck() {
    let isMaint = false;
    let msg = 'ただいまメンテナンス中です。しばらくお待ちください。';
    try {
      const r = await fetch(WORKER_ORIGIN + '/api/get-inventory');
      if (r.ok) {
        const d = await r.json();
        const m = (d.inventory && d.inventory.maintenance) || {};
        const all = m.all || {};
        const pg  = (m.pages && m.pages[PAGE_KEY]) || {};
        isMaint = !!all.on || !!pg.on;
        msg = (all.on && all.msg) || (pg.on && pg.msg) || msg;
      }
    } catch (e) { /* ネットワークエラー時は通常表示 */ }

    if (!isMaint) return;

    // すでにバイパス済みならバナーを出さない
    const bypassed = await checkBypassStored();
    if (bypassed) return;

    showBanner(msg);
    setSubmitBlocked(true);

    // メンテ中のページだけ Ctrl+Shift+K を有効化
    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && e.shiftKey && (e.key === 'K' || e.key === 'k')) {
        e.preventDefault();
        showBypassPrompt(function () {
          removeBanner();
          setSubmitBlocked(false);
        });
      }
    });
  })();
})();
</script>
</body>
</html>
