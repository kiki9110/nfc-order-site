<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文履歴（友人） — BUKI BOOTH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root{
  --ink:#2c2740; --paper:#fffdf7; --cream:#fff4ea;
  --accent:#ff7a59; --accent-press:#e85f3f; --accent2:#f2b134;
  --muted:#8a8398; --border:#f0e3d6;
  --pop:'Mochiy Pop One',sans-serif;--surface:#fff;--sel:#fff8f5;--card-sh:0 5px 0 rgba(124,107,219,.08);--btn-pop:0 3px 0 rgba(0,0,0,.05);--cta-sh:0 4px 0 var(--accent-press);--cta-shA:0 1px 0 var(--accent-press);--topbar:linear-gradient(90deg,#ff7a59,#ff9d6b);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(255,122,89,.10) 2px,transparent 2px);background-size:28px 28px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;width:100%;max-width:560px;margin:0 auto;padding:62px 20px 48px;flex:1;}
.oh-head{text-align:center;margin-bottom:26px;}
.oh-logo{font-family:var(--pop);font-size:22px;color:var(--ink);}
.oh-sub{font-size:12px;color:var(--muted);line-height:1.7;margin-top:8px;}
.list-label{font-family:var(--pop);font-size:14px;color:var(--ink);margin:4px 4px 14px;}
.oh-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:14px;box-shadow:0 5px 0 rgba(124,107,219,.07);}
:root[data-theme="night"] .oh-card{-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);box-shadow:0 16px 40px -24px rgba(0,0,0,.7);}
.oh-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.oh-num{font-family:monospace;font-size:15px;font-weight:700;letter-spacing:.04em;word-break:break-all;}
.oh-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap;}
/* 3段階＋キャンセル済みのステータスバッジ */
.ph-drafting{background:#fef3c7;color:#92400e;}
:root[data-theme="night"] .ph-drafting{background:rgba(255,207,122,.16);color:#ffcf7a;}
.ph-ordered{background:rgba(70,193,120,.16);color:#2e9c5a;}
:root[data-theme="night"] .ph-ordered{color:#5fd394;}
.ph-made{background:#eceef2;color:#6b7280;}
:root[data-theme="night"] .ph-made{background:rgba(255,255,255,.10);color:#b9b3c9;}
.ph-cancelled{background:#fde2e1;color:#c0392b;}
:root[data-theme="night"] .ph-cancelled{background:rgba(255,107,94,.16);color:#ff8c80;}
.oh-note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.6;}
.oh-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.oh-btn{font-size:12.5px;font-weight:700;padding:10px 16px;border-radius:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;border:1.5px solid var(--border);background:var(--surface);color:var(--ink);transition:transform .1s,filter .15s;}
.oh-btn:hover{filter:brightness(1.03);}
.oh-btn:active{transform:translateY(2px);}
.oh-btn.detail{background:var(--sel);border-color:#f3d3c6;color:var(--accent);}
.oh-btn.resume{background:var(--accent);border-color:var(--accent);color:#fff;}
.oh-btn.cancel{background:#fff;border-color:#f5c2c0;color:#c0392b;}
.oh-btn.cancel:hover{background:#fde2e1;}
:root[data-theme="night"] .oh-btn.cancel{background:rgba(255,107,94,.06);}
/* 制作済みのキャンセル：グレーアウト＋薄い×印でクリック不可 */
.oh-btn.cancel[disabled]{
  position:relative;
  background:#f1f3f6; border-color:#e4e7ec; color:#b6bcc7;
  cursor:default; opacity:.7;
}
.oh-btn.cancel[disabled]::after{
  content:'✕';
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:20px; color:rgba(150,150,150,.35); pointer-events:none;
}
.oh-btn.cancel[disabled]:hover{filter:none;background:#f1f3f6;}
.oh-btn.cancel[disabled]:active{transform:none;}
:root[data-theme="night"] .oh-btn.cancel[disabled]{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:#6f6880;}
/* 詳細パネル */
.oh-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--cream);}
.oh-detail.open{display:block;}
.dl-row{display:flex;gap:10px;font-size:12.5px;line-height:1.7;padding:3px 0;}
.dl-key{flex-shrink:0;width:88px;color:var(--muted);font-weight:700;}
.dl-val{color:var(--ink);word-break:break-all;}
.dl-imgs{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.dl-imgs figure{text-align:center;font-size:10px;color:var(--muted);}
.dl-imgs img{display:block;width:88px;height:88px;object-fit:contain;border:1.5px solid var(--border);border-radius:10px;background:var(--cream);margin-bottom:4px;}
.dl-empty{font-size:12.5px;color:var(--muted);line-height:1.7;}
.empty{text-align:center;color:var(--muted);font-size:13px;line-height:1.9;padding:36px 22px;background:var(--surface);border:1.6px dashed var(--border);border-radius:20px;}
.empty .empty-ic{font-size:36px;display:block;margin-bottom:10px;}
:root[data-theme="night"] .empty{-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);}
.empty-cta{display:inline-block;margin-top:12px;padding:11px 20px;background:var(--accent);border-radius:12px;color:#fff;font-weight:700;text-decoration:none;font-size:13px;}
.footer{position:relative;z-index:1;text-align:center;padding:20px;font-size:11px;color:var(--muted);letter-spacing:.04em;}
.loading{text-align:center;color:var(--muted);font-size:13px;padding:36px 0;}

/* テーマ切替・ナビ */
.theme-toggle,.nav-toggle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(44,39,64,.16);background:var(--surface);color:var(--accent);cursor:pointer;padding:0;transition:transform .12s,background .2s;flex-shrink:0;box-shadow:0 4px 14px -5px rgba(0,0,0,.25);}
.theme-toggle:hover,.nav-toggle:hover{transform:scale(1.08);}
.theme-toggle:active,.nav-toggle:active{transform:scale(.93);}
.theme-toggle svg{width:18px;height:18px;display:block;}
.nav-toggle svg{width:20px;height:20px;display:block;}
.theme-toggle .ic-sun{display:none;}
:root[data-theme="night"] .theme-toggle .ic-sun{display:block;}
:root[data-theme="night"] .theme-toggle .ic-moon{display:none;}
:root[data-theme="night"] .theme-toggle,:root[data-theme="night"] .nav-toggle{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#ffce9e;box-shadow:0 0 16px -4px rgba(255,131,88,.45);}
.float-cluster{position:fixed;top:14px;right:14px;z-index:1000;display:flex;gap:8px;align-items:center;}
.nav-overlay{position:fixed;inset:0;background:rgba(10,8,16,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:1999;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);}
.nav-overlay.open{opacity:1;pointer-events:auto;}
.nav-drawer{position:fixed;top:0;right:0;height:100%;width:min(84vw,330px);background:#fff;color:var(--ink);box-shadow:-12px 0 40px -12px rgba(0,0,0,.4);transform:translateX(102%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:2000;display:flex;flex-direction:column;overflow-y:auto;}
.nav-drawer.open{transform:translateX(0);}
:root[data-theme="night"] .nav-drawer{background:#1b1726;box-shadow:-12px 0 50px -10px rgba(0,0,0,.7);}
.nav-dhead{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--border);}
.nav-dtitle{font-family:var(--pop);font-size:16px;color:var(--ink);}
.nav-close{width:34px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.nav-close:hover{background:var(--cream);}.nav-close svg{width:18px;height:18px;}
.nav-link{display:flex;align-items:center;gap:12px;padding:15px 20px;color:var(--ink);text-decoration:none;font-size:15px;font-weight:700;border-bottom:1px solid var(--border);transition:background .15s;}
.nav-link:hover{background:var(--cream);}.nav-link:active{background:var(--sel);}
.nav-link.cur{color:var(--accent);background:var(--sel);}
.nav-ic{font-size:18px;width:24px;text-align:center;}

/* ===== ナイトモード ===== */
:root[data-theme="night"]{
  --ink:#ece9f3;--paper:#13111a;--cream:rgba(255,255,255,.06);
  --accent:#ff8358;--accent-press:#c75a3a;--muted:#9b93ac;--border:rgba(255,255,255,.12);
  --surface:rgba(255,255,255,.05);--sel:rgba(255,131,88,.12);
  --card-sh:0 16px 40px -22px rgba(0,0,0,.7);--btn-pop:none;
  --cta-sh:0 0 26px -6px rgba(255,131,88,.55);--cta-shA:0 0 12px -4px rgba(255,131,88,.55);
  --topbar:rgba(20,18,27,.55);--accent2:#ffcf7a;
}
:root[data-theme="night"] body{
  background:
    radial-gradient(140% 100% at 85% -8%,rgba(232,64,156,.42),transparent 62%),
    radial-gradient(140% 100% at -12% 108%,rgba(124,86,240,.40),transparent 62%),
    linear-gradient(160deg,#1c1228,#110d19 58%,#160f20);
  background-attachment:fixed;color:var(--ink);
}
:root[data-theme="night"] body::before{background-image:radial-gradient(rgba(255,255,255,.05) 1.5px,transparent 1.5px);}
</style>
<script>
(function(){var K='bukiTheme',mq=window.matchMedia('(prefers-color-scheme: dark)');
function eff(){var s=null;try{s=localStorage.getItem(K)}catch(e){}return(s==='light'||s==='night')?s:(mq.matches?'night':'light');}
function set(t){document.documentElement.setAttribute('data-theme',t);}
set(eff());
function om(){var s=null;try{s=localStorage.getItem(K)}catch(e){}if(s!=='light'&&s!=='night')set(mq.matches?'night':'light');}
if(mq.addEventListener)mq.addEventListener('change',om);else if(mq.addListener)mq.addListener(om);
function w(){var b=document.getElementById('themeToggle');if(!b)return;b.addEventListener('click',function(){var c=document.documentElement.getAttribute('data-theme')||eff();var n=(c==='night')?'light':'night';try{localStorage.setItem(K,n)}catch(e){}set(n);});}
if(document.readyState!=='loading')w();else document.addEventListener('DOMContentLoaded',w);})();
</script>

<script>
// ── 友人アカウント共通：ログインチェック＋APIラッパー（各 self-* ページに同一コードを埋め込み）──
const FRIEND_TOKEN_KEY = 'buki_friend_token';
function friendToken() { return localStorage.getItem(FRIEND_TOKEN_KEY) || ''; }
function friendLogoutLocal() {
  localStorage.removeItem('buki_friend_token');
  localStorage.removeItem('buki_friend_name');
  localStorage.removeItem('buki_friend_login_id');
}
if (!friendToken()) { window.location.replace('self-login.html'); }
async function friendFetch(url, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers || {}, { 'Authorization': 'Bearer ' + friendToken() });
  const r = await fetch(url, opts);
  if (r.status === 401) {
    friendLogoutLocal();
    window.location.replace('self-login.html');
    throw new Error('unauthorized');
  }
  return r;
}
async function friendLogout() {
  try {
    const WO = sessionStorage.getItem('workerOrigin') || 'https://buki-booth.com';
    await fetch(WO + '/api/friend-logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + friendToken() } });
  } catch (e) { /* 通信失敗してもローカルのログアウトは行う */ }
  friendLogoutLocal();
  window.location.href = 'self-login.html';
}
document.addEventListener('DOMContentLoaded', function () {
  var lg = document.getElementById('navLogout');
  if (lg) lg.addEventListener('click', function (ev) { ev.preventDefault(); friendLogout(); });
});
</script>

<div class="wrap">
  <div class="oh-head">
    <div class="oh-logo">📋 注文履歴</div>
    <div class="oh-sub">このアカウントの注文がすべて表示されます。<br>「注文中」の下書きは続きから編集できます。</div>
  </div>

  <div id="listArea"><div class="loading">読み込み中...</div></div>
</div>

<div class="footer">© NFC Order System</div>

<script>
const WORKER_ORIGIN = sessionStorage.getItem('workerOrigin') || 'https://buki-booth.com';
let ORDERS = [];

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
  });
}
function fmtDate(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  if (isNaN(d)) return '—';
  function p(n){ return ('0' + n).slice(-2); }
  return d.getFullYear() + '/' + p(d.getMonth()+1) + '/' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}

const STATUS_DEF = {
  drafting:  { label: '注文中',       cls: 'ph-drafting' },
  ordered:   { label: '注文済み',     cls: 'ph-ordered' },
  made:      { label: '制作済み',     cls: 'ph-made' },
  cancelled: { label: 'キャンセル済み', cls: 'ph-cancelled' },
};

function render() {
  var area = document.getElementById('listArea');
  if (!ORDERS.length) {
    area.innerHTML = '<div class="empty"><span class="empty-ic">📦</span>まだ注文はありません。<br>「新しく注文する」からキーホルダーを作ってみましょう。<br><a class="empty-cta" href="self-page1.html">＋ 新しく注文する</a></div>';
    return;
  }
  area.innerHTML = '<div class="list-label">注文一覧（' + ORDERS.length + '件）</div>' + ORDERS.map(function (o) {
    var st = STATUS_DEF[o.status] || STATUS_DEF.ordered;
    var noteLines = [];
    if (o.status === 'drafting')  noteLines.push('最終保存：' + fmtDate(o.updatedAt));
    if (o.status === 'ordered')   noteLines.push('注文日時：' + fmtDate(o.submittedAt || o.updatedAt));
    if (o.status === 'made')      noteLines.push('制作完了：' + fmtDate(o.madeAt));
    if (o.status === 'cancelled') noteLines.push('キャンセル：' + fmtDate(o.cancelledAt));

    var btns = '';
    if (o.status === 'drafting') {
      btns = '<button class="oh-btn resume" onclick="resumeDraft(\'' + esc(o.orderId) + '\')">✏️ 続きから編集</button>'
           + '<button class="oh-btn cancel" onclick="cancelOrder(\'' + esc(o.orderId) + '\', true)">キャンセル</button>';
    } else if (o.status === 'ordered') {
      btns = '<button class="oh-btn detail" onclick="toggleDetail(\'' + esc(o.orderId) + '\')">詳細を見る</button>'
           + '<button class="oh-btn cancel" onclick="cancelOrder(\'' + esc(o.orderId) + '\', false)">キャンセル</button>';
    } else if (o.status === 'made') {
      btns = '<button class="oh-btn detail" onclick="toggleDetail(\'' + esc(o.orderId) + '\')">詳細を見る</button>'
           + '<button class="oh-btn cancel" disabled title="制作済みのためキャンセルできません">キャンセル</button>';
    } else { // cancelled
      btns = '<button class="oh-btn detail" onclick="toggleDetail(\'' + esc(o.orderId) + '\')">詳細を見る</button>';
    }

    return '<div class="oh-card" id="card-' + esc(o.orderId) + '">'
      + '<div class="oh-top">'
      +   '<span class="oh-num">' + esc(o.orderId) + '</span>'
      +   '<span class="oh-badge ' + st.cls + '">' + st.label + '</span>'
      + '</div>'
      + '<div class="oh-note">' + noteLines.join('　') + '</div>'
      + '<div class="oh-actions">' + btns + '</div>'
      + '<div class="oh-detail" id="detail-' + esc(o.orderId) + '"></div>'
      + '</div>';
  }).join('');
}

async function load() {
  try {
    const r = await friendFetch(WORKER_ORIGIN + '/api/friend-order-history');
    const d = await r.json();
    if (d && d.ok) {
      ORDERS = d.orders || [];
      render();
    } else {
      document.getElementById('listArea').innerHTML = '<div class="empty"><span class="empty-ic">⚠️</span>読み込みに失敗しました。<br>時間をおいて再度お試しください。</div>';
    }
  } catch (e) {
    if (e.message !== 'unauthorized')
      document.getElementById('listArea').innerHTML = '<div class="empty"><span class="empty-ic">⚠️</span>通信エラーが発生しました。<br>電波状況をご確認のうえ再読み込みしてください。</div>';
  }
}

function resumeDraft(orderId) {
  window.location.href = 'self-page2.html?orderId=' + encodeURIComponent(orderId) + '&resume=1';
}

async function cancelOrder(orderId, isDraft) {
  var msg = isDraft
    ? '本当にキャンセルしますか？\n下書き（注文中）はキャンセルすると削除され、元に戻せません。'
    : '本当にキャンセルしますか？';
  if (!window.confirm(msg)) return;
  try {
    const r = await friendFetch(WORKER_ORIGIN + '/api/friend-cancel-order', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId: orderId }),
    });
    const d = await r.json();
    if (d && d.ok) { load(); }
    else { alert((d && d.message) || 'キャンセルに失敗しました。'); }
  } catch (e) {
    if (e.message !== 'unauthorized') alert('通信エラーが発生しました。もう一度お試しください。');
  }
}

// 詳細表示（送信済み注文のみ。既存の公開API customer-order から取得）
async function toggleDetail(orderId) {
  var panel = document.getElementById('detail-' + orderId);
  if (!panel) return;
  if (panel.classList.contains('open')) { panel.classList.remove('open'); return; }
  panel.classList.add('open');
  if (panel.dataset.loaded) return;
  panel.innerHTML = '<div class="dl-empty">読み込み中...</div>';
  try {
    const r = await fetch(WORKER_ORIGIN + '/api/customer-order?orderId=' + encodeURIComponent(orderId));
    const d = await r.json();
    if (!d || !d.exists) { panel.innerHTML = '<div class="dl-empty">詳細を取得できませんでした。</div>'; return; }
    var o = d.order || {};
    var rows = '';
    function row(k, v) { if (v) rows += '<div class="dl-row"><span class="dl-key">' + k + '</span><span class="dl-val">' + esc(v) + '</span></div>'; }
    row('形状', ({circle:'丸型',square:'四角形',rect:'自由四角',diecut:'ダイカット'})[o.shape] || o.shape);
    row('カラー', o.color);
    if (o.shape === 'rect') row('サイズ', (o.widthCm || '?') + ' × ' + (o.heightCm || '?') + ' cm');
    else if (o.sizeCm) row('サイズ', '長辺 ' + o.sizeCm + ' cm');
    row('NFCタグ', o.nfc ? 'あり' : '');
    row('QRコード', o.qr ? 'あり' : '');
    row('両面印刷', o.backPrint ? 'あり' : '');
    if (o.quantity && o.quantity > 1) row('枚数', o.quantity + '枚');
    row('こだわり・備考', o.note);
    var imgs = '';
    if (o.imgFront) imgs += '<figure><img src="' + o.imgFront + '" alt="おもて面"><figcaption>おもて</figcaption></figure>';
    if (o.imgBack)  imgs += '<figure><img src="' + o.imgBack  + '" alt="うら面"><figcaption>うら</figcaption></figure>';
    panel.innerHTML = (rows || '<div class="dl-empty">注文内容の詳細データがありません。</div>') + (imgs ? '<div class="dl-imgs">' + imgs + '</div>' : '');
    panel.dataset.loaded = '1';
  } catch (e) {
    panel.innerHTML = '<div class="dl-empty">通信エラーで詳細を取得できませんでした。</div>';
  }
}

load();
</script>

(function(){var t=document.getElementById('navToggle'),d=document.getElementById('navDrawer'),o=document.getElementById('navOverlay'),c=document.getElementById('navClose');if(!t||!d)return;function op(){d.classList.add('open');if(o)o.classList.add('open');d.setAttribute('aria-hidden','false');}function cl(){d.classList.remove('open');if(o)o.classList.remove('open');d.setAttribute('aria-hidden','true');}t.addEventListener('click',op);if(c)c.addEventListener('click',cl);if(o)o.addEventListener('click',cl);document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();

<script>
(function () {
  const PAGE_KEY = 'self-order-history';
  const WORKER_ORIGIN = sessionStorage.getItem('workerOrigin') || 'https://buki-booth.com';
  const BYPASS_KEY = 'buki_maint_bypass_pw';

  function setSubmitBlocked(blocked) { /* このページには送信ボタンなし */ }

  function showBanner(msg) {
    if (document.getElementById('maint-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'maint-banner';
    banner.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(10,10,20,.85);display:flex;align-items:center;justify-content:center;padding:24px;';
    banner.innerHTML =
      '<div style="background:#fff;border-radius:16px;padding:32px 24px;max-width:380px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);">' +
        '<div style="font-size:40px;margin-bottom:12px;">🔧</div>' +
        '<div style="font-size:18px;font-weight:700;margin-bottom:10px;">メンテナンス中</div>' +
        '<div style="font-size:13px;color:#6b6860;line-height:1.7;">' + msg + '</div>' +
      '</div>';
    document.body.appendChild(banner);
  }

  function removeBanner() {
    const b = document.getElementById('maint-banner');
    if (b) b.remove();
  }

  function showBypassPrompt(onSuccess) {
    if (document.getElementById('maint-bypass-modal')) return;
    const wrap = document.createElement('div');
    wrap.id = 'maint-bypass-modal';
    wrap.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:24px;';
    wrap.innerHTML =
      '<div style="background:#fff;border-radius:14px;padding:24px;max-width:320px;width:100%;">' +
        '<div style="font-weight:700;margin-bottom:12px;">管理者パスワード</div>' +
        '<input type="password" id="maint-bypass-input" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-bottom:8px;">' +
        '<div id="maint-bypass-err" style="display:none;color:#e84040;font-size:12px;margin-bottom:8px;">パスワードが違います</div>' +
        '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
          '<button id="maint-bypass-cancel" style="padding:8px 14px;">キャンセル</button>' +
          '<button id="maint-bypass-ok" style="padding:8px 14px;">確認</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(wrap);

    document.getElementById('maint-bypass-cancel').onclick = function () { wrap.remove(); };
    document.getElementById('maint-bypass-ok').onclick = async function () {
      const pw = document.getElementById('maint-bypass-input').value;
      try {
        const r = await fetch(WORKER_ORIGIN + '/api/maintenance-bypass-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const d = await r.json();
        if (d.ok) {
          localStorage.setItem(BYPASS_KEY, pw);
          wrap.remove();
          onSuccess();
        } else {
          document.getElementById('maint-bypass-err').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('maint-bypass-err').style.display = 'block';
      }
    };
  }

  async function checkBypassStored() {
    const saved = localStorage.getItem(BYPASS_KEY);
    if (!saved) return false;
    try {
      const r = await fetch(WORKER_ORIGIN + '/api/maintenance-bypass-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: saved }),
      });
      const d = await r.json();
      if (!d.ok) localStorage.removeItem(BYPASS_KEY);
      return !!d.ok;
    } catch (e) {
      return false;
    }
  }

  (async function initMaintenanceCheck() {
    let isMaint = false;
    let msg = 'ただいまメンテナンス中です。しばらくお待ちください。';
    try {
      const r = await fetch(WORKER_ORIGIN + '/api/get-inventory');
      if (r.ok) {
        const d = await r.json();
        const m = (d.inventory && d.inventory.maintenance) || {};
        const all = m.all || {};
        const pg  = (m.pages && m.pages[PAGE_KEY]) || {};
        isMaint = !!all.on || !!pg.on;
        msg = (all.on && all.msg) || (pg.on && pg.msg) || msg;
      }
    } catch (e) { /* ネットワークエラー時は通常表示 */ }

    if (!isMaint) return;

    // すでにバイパス済みならバナーを出さない
    const bypassed = await checkBypassStored();
    if (bypassed) return;

    showBanner(msg);
    setSubmitBlocked(true);

    // メンテ中のページだけ Ctrl+Shift+K を有効化
    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && e.shiftKey && (e.key === 'K' || e.key === 'k')) {
        e.preventDefault();
        showBypassPrompt(function () {
          removeBanner();
          setSubmitBlocked(false);
        });
      }
    });
  })();
})();
</script>
</body>
</html>
