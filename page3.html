<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC ORDER — 注文確認</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap');
:root{
  --ink:#0f0f0d;--paper:#f5f2ec;--cream:#ece8df;
  --accent:#d4522a;--muted:#6b6860;--border:#ccc8be;--radius:14px;
  --green:#22863a;--green-bg:#eaf7ee;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);padding-bottom:60px;}

/* TOPBAR */
.topbar{background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:13px 20px;}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--paper);letter-spacing:.06em;}
.topbar-step{font-size:11px;color:var(--accent);font-weight:500;}

/* CONTENT */
.wrap{max-width:600px;margin:0 auto;padding:24px 16px;}

/* SUCCESS BANNER */
.success-banner{
  background:var(--ink);
  border-radius:var(--radius);
  padding:28px 24px;
  text-align:center;
  margin-bottom:20px;
}
.success-icon{
  width:56px;height:56px;
  background:var(--accent);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  margin:0 auto 14px;
}
.success-title{
  font-family:'Syne',sans-serif;
  font-size:22px;font-weight:800;
  color:var(--paper);
  margin-bottom:6px;
}
.success-sub{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7;}
.order-id-badge{
  display:inline-block;
  margin-top:14px;
  padding:6px 16px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:30px;
  font-family:monospace;
  font-size:14px;
  color:var(--paper);
  letter-spacing:.08em;
}
.submitted-at{
  font-size:11px;color:rgba(255,255,255,.3);
  margin-top:8px;
}

/* SECTION CARD */
.card{
  background:#fff;
  border-radius:var(--radius);
  border:1.5px solid var(--border);
  margin-bottom:14px;
  overflow:hidden;
}
.card-head{
  padding:12px 16px;
  background:var(--cream);
  border-bottom:1px solid var(--border);
  font-size:12px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);
  display:flex;align-items:center;gap:8px;
}
.card-body{padding:16px;}

/* ROWS */
.row{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--cream);gap:16px;
}
.row:last-child{border-bottom:none;padding-bottom:0;}
.row-label{font-size:12px;color:var(--muted);flex-shrink:0;padding-top:1px;}
.row-val{font-size:13px;font-weight:500;text-align:right;word-break:break-all;}
.badge{
  display:inline-block;font-size:11px;padding:2px 8px;
  border-radius:20px;font-weight:500;
}
.badge-yes{background:#fde8e0;color:var(--accent);}
.badge-no{background:var(--cream);color:var(--muted);}
.badge-green{background:var(--green-bg);color:var(--green);}

/* COLOR SWATCH inline */
.color-dot{
  display:inline-block;
  width:14px;height:14px;
  border-radius:50%;
  border:1.5px solid rgba(0,0,0,.12);
  vertical-align:middle;
  margin-right:5px;
}

/* IMAGE PREVIEWS */
.img-row{
  display:flex;gap:16px;flex-wrap:wrap;
  padding:4px 0;
}
.img-block{text-align:center;flex:1;min-width:120px;}
.img-block label{
  display:block;font-size:11px;color:var(--muted);
  margin-bottom:6px;letter-spacing:.04em;
}
.img-block canvas{
  display:block;
  width:100%;max-width:140px;
  margin:0 auto;
  border-radius:10px;
  border:1.5px solid var(--border);
}

/* QR POSITION MINI MAP */
.qr-mini{
  position:relative;
  width:80px;height:80px;
  background:var(--cream);
  border:1.5px solid var(--border);
  border-radius:8px;
  flex-shrink:0;
}
.qr-mini-dot{
  position:absolute;
  width:14px;height:14px;
  background:var(--accent);
  border:2px solid #fff;
  border-radius:3px;
  transform:translate(-50%,-50%);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.qr-info-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.qr-info-text{font-size:12px;color:var(--muted);line-height:1.7;}

/* ATTACH MINI */
.attach-mini{
  position:relative;
  width:200px;height:200px;
  max-width:100%;
  background:#18181a;
  border-radius:10px;
  overflow:hidden;
  flex-shrink:0;
}
.attach-mini canvas{position:absolute;inset:0;width:100%;height:100%;}

/* ACTIONS */
.actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.btn{
  display:block;width:100%;padding:14px;
  border:none;border-radius:var(--radius);
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;font-weight:500;
  cursor:pointer;text-align:center;
  text-decoration:none;
}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:#333;}
.btn-secondary{
  background:transparent;
  border:1.5px solid var(--border);
  color:var(--ink);
}
.btn-secondary:hover{border-color:var(--ink);}

/* PRINT HINT */
.print-hint{
  font-size:11px;color:var(--muted);
  text-align:center;margin-top:12px;line-height:1.6;
}
@media print{
  .topbar,.actions,.print-hint{display:none;}
  .success-banner{background:#f0f0f0!important;-webkit-print-color-adjust:exact;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">NFC ORDER</div>
  <div class="topbar-step">注文確認</div>
</div>

<div class="wrap">

  <!-- SUCCESS BANNER -->
  <div class="success-banner">
    <div class="success-icon">✓</div>
    <div class="success-title">注文を受け付けました</div>
    <div class="success-sub">内容をご確認ください。<br>制作完了後、別途ご連絡いたします。</div>
    <div class="order-id-badge" id="dispOrderId">—</div>
    <div class="submitted-at" id="dispDate"></div>
  </div>

  <!-- 基本情報 -->
  <div class="card">
    <div class="card-head">📋 基本情報</div>
    <div class="card-body">
      <div class="row">
        <span class="row-label">注文番号</span>
        <span class="row-val" id="diOid">—</span>
      </div>
      <div class="row">
        <span class="row-label">土台カラー</span>
        <span class="row-val" id="diColor">—</span>
      </div>
      <div class="row">
        <span class="row-label">形状</span>
        <span class="row-val" id="diShape">—</span>
      </div>
      <div class="row">
        <span class="row-label">サイズ</span>
        <span class="row-val" id="diSize">—</span>
      </div>
      <div class="row">
        <span class="row-label">厚さ</span>
        <span class="row-val" id="diThick">—</span>
      </div>
    </div>
  </div>

  <!-- オプション -->
  <div class="card">
    <div class="card-head">⚙️ オプション</div>
    <div class="card-body">
      <div class="row">
        <span class="row-label">NFCタグ</span>
        <span class="row-val" id="diNfc">—</span>
      </div>
      <div class="row" id="nfcUrlRow" style="display:none;">
        <span class="row-label">登録URL</span>
        <span class="row-val" id="diNfcUrl" style="font-size:12px;word-break:break-all;">—</span>
      </div>
      <div class="row">
        <span class="row-label">裏面印刷</span>
        <span class="row-val" id="diBack">—</span>
      </div>
      <div class="row">
        <span class="row-label">QRコード</span>
        <span class="row-val" id="diQr">—</span>
      </div>
    </div>
  </div>

  <!-- 画像 -->
  <div class="card" id="imgCard">
    <div class="card-head">🖼️ キーホルダー画像</div>
    <div class="card-body">
      <div class="img-row" id="imgRow"></div>
    </div>
  </div>

  <!-- QR位置 -->
  <div class="card" id="qrPosCard" style="display:none;">
    <div class="card-head">📍 QRコードの位置</div>
    <div class="card-body" id="qrPosBody"></div>
  </div>

  <!-- 穴位置 -->
  <div class="card">
    <div class="card-head">🔩 穴の位置</div>
    <div class="card-body">
      <div class="qr-info-row">
        <div class="attach-mini">
          <canvas id="attachMiniCv"></canvas>
        </div>
        <div class="qr-info-text">
          <div>X: <strong id="diAttX">—</strong>%　Y: <strong id="diAttY">—</strong>%</div>
          <div>状態: <strong id="diAttMode">—</strong>　穴径: <strong>5mm</strong></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn btn-primary" onclick="window.print()">🖨 この内容を印刷・保存</button>
    <a href="page1.html" class="btn btn-secondary">← 最初からやり直す</a>
  </div>
  <div class="print-hint">※ 「印刷」→「PDFとして保存」でファイルに保存できます</div>

</div><!-- /wrap -->

<script>
// ─── データ読み込み ───
let O = null;
try {
  const raw = sessionStorage.getItem('orderData');
  if (raw) O = JSON.parse(raw);
} catch(e) {}

if (!O) {
  document.body.innerHTML = '<div style="padding:40px;text-align:center;"><p>注文データが見つかりません。</p><a href="page1.html" style="color:#d4522a;">最初からやり直す</a></div>';
  throw new Error('no order data');
}

// 画像が分割保存されていた場合
if (O.imgFront === '__large__') O.imgFront = sessionStorage.getItem('orderImgFront') || null;
if (O.imgBack  === '__large__') O.imgBack  = sessionStorage.getItem('orderImgBack')  || null;

// ─── 基本情報 ───
document.getElementById('dispOrderId').textContent = O.orderId || '—';
document.getElementById('dispDate').textContent    = O.submittedAt || '';
document.getElementById('diOid').textContent       = O.orderId || '—';

// カラー
const colorEl = document.getElementById('diColor');
if (O.colorHex) {
  const dot = document.createElement('span');
  dot.className = 'color-dot';
  dot.style.background = O.colorHex;
  if (O.colorHex === '#FFFFFF') dot.style.border = '1.5px solid #ccc';
  colorEl.appendChild(dot);
  colorEl.appendChild(document.createTextNode(O.color || '—'));
} else {
  colorEl.textContent = O.color || '—';
}

// 形状
const shapeNames = { circle:'丸型', square:'四角形', rect:'自由四角', diecut:'ダイカット' };
document.getElementById('diShape').textContent  = shapeNames[O.shape] || O.shape || '—';
// サイズ表示：自由四角は横×縦、ダイアは長辺×短辺、その他は長辺
(function(){
  let txt;
  if (O.shape === 'rect' && O.widthCm && O.heightCm) {
    txt = O.widthCm + ' × ' + O.heightCm + ' cm';
  } else if (O.shape === 'diecut' && O.sizeCm) {
    var p = O.dieFront || O.dieBack, asp = 1;
    if (p && p.length >= 3) {
      var x0=1,y0=1,x1=0,y1=0;
      for (var i=0;i<p.length;i++){ if(p[i].x<x0)x0=p[i].x; if(p[i].x>x1)x1=p[i].x; if(p[i].y<y0)y0=p[i].y; if(p[i].y>y1)y1=p[i].y; }
      var lng=Math.max(x1-x0,y1-y0), sht=Math.min(x1-x0,y1-y0); asp = lng>0?sht/lng:1;
    }
    txt = O.sizeCm + ' × ' + (O.sizeCm*asp).toFixed(1) + ' cm';
  } else {
    txt = (O.sizeCm || '—') + ' cm';
  }
  document.getElementById('diSize').textContent = txt;
})();
document.getElementById('diThick').textContent  = (O.thickCm || '—') + ' cm';

// ─── オプション ───
const nfcEl = document.getElementById('diNfc');
if (O.nfc) {
  nfcEl.innerHTML = '<span class="badge badge-yes">あり +¥300</span>';
  document.getElementById('nfcUrlRow').style.display = '';
  document.getElementById('diNfcUrl').textContent = O.nfcUrl || '（URL未入力）';
} else {
  nfcEl.innerHTML = '<span class="badge badge-no">なし</span>';
}

const backEl = document.getElementById('diBack');
backEl.innerHTML = O.backPrint
  ? '<span class="badge badge-yes">あり +¥100</span>'
  : '<span class="badge badge-no">なし</span>';

const qrEl = document.getElementById('diQr');
if (O.qr) {
  const sideText = { front:'おもて面', back:'うら面', both:'両面' }[O.qrSide] || O.qrSide || '';
  qrEl.innerHTML = `<span class="badge badge-yes">あり</span> <span style="font-size:12px;color:var(--muted);">${sideText}</span>`;
} else {
  qrEl.innerHTML = '<span class="badge badge-no">なし</span>';
}

// ─── 画像プレビュー ───
function drawImgCanvas(canvasEl, src, shape) {
  canvasEl.width = 200; canvasEl.height = 200;
  canvasEl.style.borderRadius = shape === 'circle' ? '50%' : '10px';
  const ctx = canvasEl.getContext('2d');
  if (!src) {
    ctx.fillStyle = '#eee'; ctx.fillRect(0,0,200,200);
    ctx.fillStyle = '#aaa'; ctx.font = '13px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('画像なし', 100, 100);
    return;
  }
  const img = new Image(); img.src = src;
  img.onload = () => {
    if (shape === 'rect' && O.widthCm && O.heightCm) {
      // 自由四角：縦横比に合わせた長方形でプレビュー
      const ar = O.widthCm / O.heightCm;
      let w, h; if (ar >= 1) { w = 200; h = 200/ar; } else { h = 200; w = 200*ar; }
      const x = (200-w)/2, y = (200-h)/2;
      ctx.clearRect(0,0,200,200);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x+8,y); ctx.arcTo(x+w,y,x+w,y+h,8); ctx.arcTo(x+w,y+h,x,y+h,8); ctx.arcTo(x,y+h,x,y,8); ctx.arcTo(x,y,x+w,y,8); ctx.closePath();
      ctx.clip();
      const ir = img.naturalWidth/img.naturalHeight, br = w/h;
      let dw,dh,dx,dy; if (ir>br){dh=h;dw=dh*ir;dx=x-(dw-w)/2;dy=y;} else {dw=w;dh=dw/ir;dy=y-(dh-h)/2;dx=x;}
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.restore();
    } else { ctx.drawImage(img, 0, 0, 200, 200); }
  };
}

const imgRow = document.getElementById('imgRow');
const frontBlock = document.createElement('div');
frontBlock.className = 'img-block';
frontBlock.innerHTML = O.backPrint ? '<label>おもて面</label>' : '';
const cvFront = document.createElement('canvas');
frontBlock.appendChild(cvFront);
imgRow.appendChild(frontBlock);
drawImgCanvas(cvFront, O.imgFront, O.shape);

if (O.backPrint) {
  const backBlock = document.createElement('div');
  backBlock.className = 'img-block';
  backBlock.innerHTML = '<label>うら面</label>';
  const cvBack = document.createElement('canvas');
  backBlock.appendChild(cvBack);
  imgRow.appendChild(backBlock);
  drawImgCanvas(cvBack, O.imgBack, O.shape);
}

// ─── QR位置ミニマップ ───
if (O.qr && O.qrSide) {
  const card = document.getElementById('qrPosCard');
  card.style.display = '';
  const body = document.getElementById('qrPosBody');

  function makeQRMiniMap(label, qrData, imgSrc) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'margin-bottom:14px;';

    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;';
    lbl.textContent = label;
    wrap.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'qr-info-row';

    // ミニマップ（画像＋QR枠）
    const mini = document.createElement('canvas');
    mini.width = 100; mini.height = 100;
    mini.style.cssText = 'width:100px;height:100px;border-radius:8px;border:1.5px solid var(--border);flex-shrink:0;';
    row.appendChild(mini);

    // テキスト情報
    const info = document.createElement('div');
    info.className = 'qr-info-text';
    info.innerHTML = `
      <div>サイズ: <strong>${qrData.cm.toFixed(1)} cm</strong></div>
      <div>位置 X: <strong>${Math.round(qrData.x)}%</strong>　Y: <strong>${Math.round(qrData.y)}%</strong></div>
      <div style="font-size:11px;margin-top:4px;color:var(--muted);">（キーホルダー領域内の座標）</div>
    `;
    row.appendChild(info);
    wrap.appendChild(row);

    // キャンバスに描画
    const ctx = mini.getContext('2d');
    const mw = 100, mh = 100;
    const margin = 8;
    const box = Math.min(mw, mh) - margin*2;
    let kw = box, kh = box;
    if (O.shape === 'rect' && O.widthCm && O.heightCm) { const ar = O.widthCm/O.heightCm; if (ar>=1){kw=box;kh=box/ar;} else {kh=box;kw=box*ar;} }
    const ox = (mw-kw)/2, oy = (mh-kh)/2;

    function drawMini(imgEl) {
      ctx.clearRect(0,0,mw,mh);
      // キーホルダー輪郭
      ctx.save();
      ctx.beginPath();
      if (O.shape === 'circle') ctx.arc(ox+kw/2, oy+kh/2, Math.min(kw,kh)/2, 0, Math.PI*2);
      else { ctx.rect(ox,oy,kw,kh); }
      if (imgEl) {
        ctx.clip();
        const ir = imgEl.naturalWidth/imgEl.naturalHeight;
        const kr = kw/kh;
        let dw,dh,dx,dy;
        if(ir>kr){dh=kh;dw=dh*ir;dx=ox-(dw-kw)/2;dy=oy;}
        else{dw=kw;dh=dw/ir;dy=oy-(dh-kh)/2;dx=ox;}
        ctx.drawImage(imgEl,dx,dy,dw,dh);
      } else {
        ctx.fillStyle='#e8e5dc'; ctx.fill();
      }
      ctx.restore();
      // 外枠
      ctx.strokeStyle='rgba(0,0,0,.15)'; ctx.lineWidth=1;
      ctx.beginPath();
      if (O.shape==='circle') ctx.arc(ox+kw/2,oy+kh/2,Math.min(kw,kh)/2,0,Math.PI*2);
      else ctx.rect(ox,oy,kw,kh);
      ctx.stroke();
      // QR枠
      const pxPerCm = (O.shape==='rect' && O.widthCm) ? kw / O.widthCm : kw / (O.sizeCm || 7);
      const qpx = Math.max(8, qrData.cm * pxPerCm);
      const qx  = ox + kw * qrData.x/100 - qpx/2;
      const qy  = oy + kh * qrData.y/100 - qpx/2;
      ctx.fillStyle   = 'rgba(255,255,255,.85)';
      ctx.strokeStyle = '#d4522a'; ctx.lineWidth=1.5;
      ctx.fillRect(qx,qy,qpx,qpx);
      ctx.strokeRect(qx,qy,qpx,qpx);
      ctx.fillStyle='#d4522a'; ctx.font='bold 7px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('QR',qx+qpx/2,qy+qpx/2);
    }

    if (imgSrc) {
      const img = new Image(); img.src = imgSrc;
      img.onload = () => drawMini(img);
    } else { drawMini(null); }

    body.appendChild(wrap);
  }

  if (O.qrSide === 'front' || O.qrSide === 'both') {
    makeQRMiniMap('おもて面', O.qrFront, O.imgFront);
  }
  if (O.qrSide === 'back' || O.qrSide === 'both') {
    makeQRMiniMap('うら面', O.qrBack, O.imgBack);
  }
}

// ─── 穴位置 ───
document.getElementById('diAttX').textContent = Math.round(O.attX != null ? O.attX : 50);
document.getElementById('diAttY').textContent = Math.round(O.attY != null ? O.attY : 10);
document.getElementById('diAttMode').textContent = (O.attMode === 'outside') ? '外付けツメ' : '本体内';

// 穴ミニマップ（page2 と同じ描画ロジック：5mm固定・内側/外側・縁ギリギリは補強リング）
(function drawAttach(){
  const cv = document.getElementById('attachMiniCv');
  const aw = 200, ah = 200;
  cv.width = aw; cv.height = ah;   // 内部解像度（表示サイズはCSSの .attach-mini に従う）
  const ctx = cv.getContext('2d');
  const WRAP_BG = '#16161a';
  const shape  = O.shape || 'circle';
  const sizeCm = O.sizeCm || 7;
  const holeCm = O.holeCm || 0.5;          // 5mm固定
  const acryl  = O.colorHex || '#d9d4c7';
  const attX   = (O.attX != null ? O.attX : 50);
  const attY   = (O.attY != null ? O.attY : 10);

  // 本体ジオメトリ（中央配置・サイズに比例して拡大縮小／最大15cmで枠いっぱい）
  const margin = 20, maxBody = Math.min(aw-margin*2, ah-margin*2);
  const ppc = maxBody / 15;
  // 丸/四角=正方形、自由四角=横/縦、ダイア=正方形フレーム(シルエットが縦横比を持つ)
  var bw, bh;
  if (shape === 'rect') { bw = ppc * (O.widthCm || sizeCm); bh = ppc * (O.heightCm || sizeCm); }
  else { bw = bh = ppc * sizeCm; }
  const g = { cx: aw/2, cy: ah/2, w: bw, h: bh, size: Math.max(bw,bh), r: Math.min(bw,bh)/2, x: aw/2-bw/2, y: ah/2-bh/2, rad: Math.min(bw,bh)*0.06 };
  const pxPerCm = ppc;   // 穴は5mm固定 → 一定サイズ

  function rrect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
  // ダイカットの実シルエット（正規化ポリゴン）→ ボックス座標
  const diePolyN = (shape==='diecut') ? (O.dieFront || O.dieBack || null) : null;
  const diePts = (diePolyN && diePolyN.length>=3) ? diePolyN.map(function(q){return {x:g.x+q.x*g.size, y:g.y+q.y*g.size};}) : null;
  function pointInPoly(x,y,pts){ var c=false; for(var i=0,j=pts.length-1;i<pts.length;j=i++){ var xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y; if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) c=!c; } return c; }
  function polyCentroid(pts){ var sx=0,sy=0; for(var i=0;i<pts.length;i++){sx+=pts[i].x;sy+=pts[i].y;} return {x:sx/pts.length,y:sy/pts.length}; }
  function segDist(px,py,ax,ay,bx,by){ var dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy,t=l2?((px-ax)*dx+(py-ay)*dy)/l2:0; t=Math.max(0,Math.min(1,t)); return Math.hypot(px-(ax+t*dx),py-(ay+t*dy)); }
  function minEdgeDist(x,y,pts){ var m=1e9; for(var i=0,j=pts.length-1;i<pts.length;j=i++) m=Math.min(m,segDist(x,y,pts[j].x,pts[j].y,pts[i].x,pts[i].y)); return m; }
  function segSegInt(x1,y1,x2,y2,x3,y3,x4,y4){ var d=(x2-x1)*(y4-y3)-(y2-y1)*(x4-x3); if(Math.abs(d)<1e-9) return null; var t=((x3-x1)*(y4-y3)-(y3-y1)*(x4-x3))/d,u=((x3-x1)*(y2-y1)-(y3-y1)*(x2-x1))/d; if(t>=0&&t<=1&&u>=0&&u<=1) return {x:x1+t*(x2-x1),y:y1+t*(y2-y1),t:t}; return null; }
  function rayPolyHit(cx,cy,px,py,pts){ var dx=px-cx,dy=py-cy,fx=cx+dx*1000,fy=cy+dy*1000,best=null,bt=-1; for(var i=0,j=pts.length-1;i<pts.length;j=i++){ var r=segSegInt(cx,cy,fx,fy,pts[j].x,pts[j].y,pts[i].x,pts[i].y); if(r&&r.t>bt){bt=r.t;best={x:r.x,y:r.y};} } return best; }
  function diePath(c){ c.beginPath(); c.moveTo(diePts[0].x,diePts[0].y); for(var i=1;i<diePts.length;i++) c.lineTo(diePts[i].x,diePts[i].y); c.closePath(); }
  function bodyPath(c){ if(shape==='diecut'&&diePts){ diePath(c); return; } c.beginPath(); if(shape==='circle') c.arc(g.cx,g.cy,g.r,0,Math.PI*2); else rrect(c,g.x,g.y,g.w,g.h,g.rad); }
  function lugFullyInside(px,py,lugR){ if(shape==='diecut'&&diePts) return pointInPoly(px,py,diePts)&&minEdgeDist(px,py,diePts)>=lugR; if(shape==='circle') return Math.hypot(px-g.cx,py-g.cy)+lugR<=g.r; return px>=g.x+lugR&&px<=g.x+g.w-lugR&&py>=g.y+lugR&&py<=g.y+g.h-lugR; }
  function edgeAnchor(px,py){ if(shape==='diecut'&&diePts){ var c=polyCentroid(diePts); var hit=rayPolyHit(c.x,c.y,px,py,diePts); if(hit) return hit; } var an=Math.atan2(py-g.cy,px-g.cx); if(shape==='circle') return {x:g.cx+Math.cos(an)*g.r,y:g.cy+Math.sin(an)*g.r}; var dx=Math.cos(an),dy=Math.sin(an),hw=g.w/2,hh=g.h/2,tx=dx?hw/Math.abs(dx):1e9,ty=dy?hh/Math.abs(dy):1e9,t=Math.min(tx,ty); return {x:g.cx+dx*t,y:g.cy+dy*t}; }

  const hx = g.x + g.w*attX/100, hy = g.y + g.h*attY/100;
  const holeR = Math.max(2, (holeCm/2)*pxPerCm);
  const lugR  = (holeR + Math.max(8, holeR*0.9)) * 2/3;   // ディスク半径＝旧サイズの2/3（首と同じ幅に）

  // 補強のツメ（穴を囲むふち＋同じ太さの首、接合部は直角）
  function buildTab(){
    const a = edgeAnchor(hx,hy), an = Math.atan2(hy-g.cy,hx-g.cx);
    const neckW = lugR*2, rootX = a.x-Math.cos(an)*lugR, rootY = a.y-Math.sin(an)*lugR;   // 首＝ディスク直径（従来の首と同じ太さ）
    const BORDER = 'rgba(255,255,255,.30)';
    const tc = document.createElement('canvas'); tc.width=aw; tc.height=ah;
    const t = tc.getContext('2d'); t.lineCap='round'; t.lineJoin='round';
    t.strokeStyle=BORDER; t.lineWidth=neckW+3; t.beginPath(); t.moveTo(rootX,rootY); t.lineTo(hx,hy); t.stroke();
    t.fillStyle=BORDER; t.beginPath(); t.arc(hx,hy,lugR+1.5,0,Math.PI*2); t.fill();
    t.strokeStyle=acryl; t.lineWidth=neckW; t.beginPath(); t.moveTo(rootX,rootY); t.lineTo(hx,hy); t.stroke();
    t.fillStyle=acryl; t.beginPath(); t.arc(hx,hy,lugR,0,Math.PI*2); t.fill();
    t.globalCompositeOperation='destination-out'; t.fillStyle='#000'; bodyPath(t); t.fill();
    t.globalCompositeOperation='source-over';
    return tc;
  }

  function draw(imgEl){
    ctx.clearRect(0,0,aw,ah);
    ctx.fillStyle=WRAP_BG; ctx.fillRect(0,0,aw,ah);
    if(!lugFullyInside(hx,hy,lugR)) ctx.drawImage(buildTab(),0,0,aw,ah);  // 補強リング/ツメ（本体の下）
    // 本体（画像 or 単色）
    ctx.save(); bodyPath(ctx); ctx.clip();
    if(shape==='diecut'&&diePts){ ctx.fillStyle=acryl; ctx.fill(); }   // ダイカットは土台色（縁取り）
    if(imgEl){ const ir=imgEl.naturalWidth/imgEl.naturalHeight, br=g.w/g.h; let dw,dh,dx,dy; if(ir>br){dh=g.h;dw=dh*ir;dx=g.x-(dw-g.w)/2;dy=g.y;} else {dw=g.w;dh=dw/ir;dy=g.y-(dh-g.h)/2;dx=g.x;} ctx.drawImage(imgEl,dx,dy,dw,dh); }
    else if(shape!=='diecut'){ ctx.fillStyle=acryl; ctx.fill(); }
    ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,.30)'; ctx.lineWidth=1.5; bodyPath(ctx); ctx.stroke();
    // 穴をくり抜く
    ctx.beginPath(); ctx.arc(hx,hy,holeR,0,Math.PI*2); ctx.fillStyle=WRAP_BG; ctx.fill();
    ctx.lineWidth=1.4; ctx.strokeStyle='rgba(0,0,0,.45)'; ctx.beginPath(); ctx.arc(hx,hy,holeR,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=1; ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.beginPath(); ctx.arc(hx,hy,Math.max(1,holeR-1.4),0,Math.PI*2); ctx.stroke();
  }

  const useImg = (O.attachView==='back' ? O.imgBack : O.imgFront) || O.imgFront;
  if(useImg){ const im=new Image(); im.onload=()=>draw(im); im.onerror=()=>draw(null); im.src=useImg; }
  else draw(null);
})();
</script>
</body>
</html>
