<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC ORDER — 注文確認</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@400;500;700;900&family=Syne:wght@700;800&display=swap');
:root{
  --ink:#2c2740;--paper:#fffdf7;--cream:#fff4ea;
  --accent:#ff7a59;--accent-press:#e85f3f;--muted:#8a8398;--border:#f0e3d6;--radius:18px;
  --green:#1f9d57;--green-bg:#e7f7ee;--pop:'Mochiy Pop One',sans-serif;--surface:#fff;--sel:#fff8f5;--card-sh:0 5px 0 rgba(124,107,219,.08);--btn-pop:0 3px 0 rgba(0,0,0,.05);--cta-sh:0 4px 0 var(--accent-press);--cta-shA:0 1px 0 var(--accent-press);--topbar:linear-gradient(90deg,#ff7a59,#ff9d6b);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);padding-bottom:60px;}

/* TOPBAR */
.topbar{background:var(--topbar);display:flex;align-items:center;justify-content:space-between;padding:13px 20px;}
.topbar-logo{font-family:var(--pop);font-weight:400;font-size:16px;color:#fff;letter-spacing:.04em;text-shadow:0 1px 0 rgba(0,0,0,.12);}
.topbar-step{font-size:11px;color:#fff;font-weight:700;}

/* CONTENT */
.wrap{max-width:600px;margin:0 auto;padding:24px 16px;}

/* SUCCESS BANNER */
.success-banner{
  background:linear-gradient(135deg,#ff7a59,#ff9d6b);
  border-radius:var(--radius);
  padding:28px 24px;
  text-align:center;
  margin-bottom:20px;
  box-shadow:0 8px 0 rgba(124,107,219,.12);
}
.success-icon{
  width:60px;height:60px;
  background:var(--surface);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  margin:0 auto 14px;
  box-shadow:0 4px 0 rgba(0,0,0,.10);
}
.success-title{
  font-family:var(--pop);
  font-size:22px;font-weight:400;
  color:#fff;
  margin-bottom:6px;
  text-shadow:0 1px 0 rgba(0,0,0,.12);
}
.success-sub{font-size:13px;color:rgba(255,255,255,.92);line-height:1.7;}
.order-id-badge{
  display:inline-block;
  margin-top:14px;
  padding:6px 16px;
  background:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.4);
  border-radius:30px;
  font-family:monospace;
  font-size:14px;
  color:var(--paper);
  letter-spacing:.08em;
}
.submitted-at{
  font-size:11px;color:rgba(255,255,255,.8);
  margin-top:8px;
}

/* SECTION CARD */
.card{
  background:var(--surface);
  border-radius:var(--radius);
  border:1.5px solid var(--border);
  margin-bottom:14px;
  overflow:hidden;
  box-shadow:var(--card-sh);
}
.card-head{
  padding:12px 16px;
  background:var(--cream);
  border-bottom:1px solid var(--border);
  font-size:12px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);
  display:flex;align-items:center;gap:8px;
}
.card-body{padding:16px;}

/* ROWS */
.row{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--cream);gap:16px;
}
.row:last-child{border-bottom:none;padding-bottom:0;}
.row-label{font-size:12px;color:var(--muted);flex-shrink:0;padding-top:1px;}
.row-val{font-size:13px;font-weight:500;text-align:right;word-break:break-all;}
.badge{
  display:inline-block;font-size:11px;padding:2px 8px;
  border-radius:20px;font-weight:500;
}
.badge-yes{background:#fde8e0;color:var(--accent);}
.badge-no{background:var(--cream);color:var(--muted);}
.badge-green{background:var(--green-bg);color:var(--green);}

/* COLOR SWATCH inline */
.color-dot{
  display:inline-block;
  width:14px;height:14px;
  border-radius:50%;
  border:1.5px solid rgba(0,0,0,.12);
  vertical-align:middle;
  margin-right:5px;
}

/* IMAGE PREVIEWS */
.img-row{
  display:flex;gap:16px;flex-wrap:wrap;
  padding:4px 0;
}
.img-block{text-align:center;flex:1;min-width:120px;}
.img-block label{
  display:block;font-size:11px;color:var(--muted);
  margin-bottom:6px;letter-spacing:.04em;
}
.img-block canvas{
  display:block;
  width:100%;max-width:140px;
  margin:0 auto;
  border-radius:10px;
  border:1.5px solid var(--border);
}

/* QR POSITION MINI MAP */
.qr-mini{
  position:relative;
  width:80px;height:80px;
  background:var(--cream);
  border:1.5px solid var(--border);
  border-radius:8px;
  flex-shrink:0;
}
.qr-mini-dot{
  position:absolute;
  width:14px;height:14px;
  background:var(--accent);
  border:2px solid #fff;
  border-radius:3px;
  transform:translate(-50%,-50%);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.qr-info-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.qr-info-text{font-size:12px;color:var(--muted);line-height:1.7;}

/* ATTACH MINI */
.attach-mini{
  position:relative;
  width:200px;height:200px;
  max-width:100%;
  background:#18181a;
  border-radius:10px;
  overflow:hidden;
  flex-shrink:0;
}
.attach-mini canvas{position:absolute;inset:0;width:100%;height:100%;}

/* ACTIONS */
.actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.btn{
  display:block;width:100%;padding:14px;
  border:none;border-radius:var(--radius);
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;font-weight:500;
  cursor:pointer;text-align:center;
  text-decoration:none;
}
.btn-primary{background:var(--accent);color:#fff;font-family:var(--pop);font-weight:400;box-shadow:var(--cta-sh);transition:transform .1s,box-shadow .1s,filter .15s;}
.btn-primary:hover{filter:brightness(1.04);}
.btn-primary:active{transform:translateY(4px);box-shadow:var(--cta-shA);}
.btn-secondary{
  background:transparent;
  border:1.5px solid var(--border);
  color:var(--ink);
}
.btn-secondary:hover{border-color:var(--ink);}

/* PRINT HINT */
.print-hint{
  font-size:11px;color:var(--muted);
  text-align:center;margin-top:12px;line-height:1.6;
}
@media print{
  .topbar,.actions,.print-hint{display:none;}
  .success-banner{background:#f0f0f0!important;-webkit-print-color-adjust:exact;}
}

/* テーマ切替ボタン */
.topbar{display:flex;align-items:center;justify-content:space-between;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);background:rgba(255,255,255,.2);color:#fff;cursor:pointer;padding:0;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);transition:transform .12s,background .2s;flex-shrink:0;}
.theme-toggle:hover{transform:scale(1.08);}
.theme-toggle:active{transform:scale(.93);}
.theme-toggle svg{width:18px;height:18px;display:block;}
.theme-toggle .ic-sun{display:none;}
:root[data-theme="night"] .theme-toggle .ic-sun{display:block;}
:root[data-theme="night"] .theme-toggle .ic-moon{display:none;}
:root[data-theme="night"] .theme-toggle{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#ffce9e;}
.theme-toggle--float{position:fixed;top:14px;right:14px;z-index:1000;border-color:rgba(44,39,64,.16);background:var(--surface);color:var(--accent);box-shadow:0 4px 14px -5px rgba(0,0,0,.25);}
:root[data-theme="night"] .theme-toggle--float{background:rgba(255,255,255,.08);color:#ffce9e;box-shadow:0 0 16px -4px rgba(255,131,88,.45);}

/* ===== ナイトモード（ダーク×すりガラス×やわらかい発光） ===== */
:root[data-theme="night"]{
  --ink:#ece9f3;--paper:#13111a;--cream:rgba(255,255,255,.06);
  --accent:#ff8358;--accent-press:#c75a3a;--muted:#9b93ac;--border:rgba(255,255,255,.12);
  --surface:rgba(255,255,255,.05);--sel:rgba(255,131,88,.12);
  --card-sh:0 16px 40px -22px rgba(0,0,0,.7);--btn-pop:none;
  --cta-sh:0 0 26px -6px rgba(255,131,88,.55);--cta-shA:0 0 12px -4px rgba(255,131,88,.55);
  --topbar:rgba(20,18,27,.55);--accent2:#ffcf7a;--ok:#46c178;--err:#ff6b5e;
}
:root[data-theme="night"] body{
  background:
    radial-gradient(140% 100% at 85% -8%,rgba(232,64,156,.42),transparent 62%),
    radial-gradient(140% 100% at -12% 108%,rgba(124,86,240,.40),transparent 62%),
    linear-gradient(160deg,#1c1228,#110d19 58%,#160f20);
  background-attachment:fixed;color:var(--ink);
}
:root[data-theme="night"] .topbar{-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08);}
:root[data-theme="night"] .topbar-step{color:#ff9d75;}
:root[data-theme="night"] .success-banner{box-shadow:0 0 40px -10px rgba(255,131,88,.5);}
:root[data-theme="night"] .card{-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);}
:root[data-theme="night"] .badge-yes{background:rgba(255,131,88,.16);color:#ff9d75;}
:root[data-theme="night"] .badge-green{background:rgba(70,193,120,.16);color:#7fe0a6;}
:root[data-theme="night"] .attach-mini{border:1px solid rgba(255,255,255,.1);}

/* メニュー（ハンバーガー） */
.nav-toggle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);background:rgba(255,255,255,.2);color:#fff;cursor:pointer;padding:0;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);transition:transform .12s,background .2s;flex-shrink:0;}
.nav-toggle:hover{transform:scale(1.08);}.nav-toggle:active{transform:scale(.93);}
.nav-toggle svg{width:20px;height:20px;display:block;}
:root[data-theme="night"] .nav-toggle{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#ffce9e;}
.nav-overlay{position:fixed;inset:0;background:rgba(10,8,16,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:1999;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);}
.nav-overlay.open{opacity:1;pointer-events:auto;}
.nav-drawer{position:fixed;top:0;right:0;height:100%;width:min(84vw,330px);background:#fff;color:var(--ink);box-shadow:-12px 0 40px -12px rgba(0,0,0,.4);transform:translateX(102%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:2000;display:flex;flex-direction:column;overflow-y:auto;}
.nav-drawer.open{transform:translateX(0);}
:root[data-theme="night"] .nav-drawer{background:#1b1726;box-shadow:-12px 0 50px -10px rgba(0,0,0,.7);}
.nav-dhead{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--border);}
.nav-dtitle{font-family:var(--pop);font-size:16px;color:var(--ink);}
.nav-close{width:34px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.nav-close:hover{background:var(--cream);}.nav-close svg{width:18px;height:18px;}
.nav-link{display:flex;align-items:center;gap:12px;padding:15px 20px;color:var(--ink);text-decoration:none;font-size:15px;font-weight:700;border-bottom:1px solid var(--border);transition:background .15s;}
.nav-link:hover{background:var(--cream);}.nav-link:active{background:var(--sel);}
.nav-link.cur{color:var(--accent);background:var(--sel);}
.nav-ic{font-size:18px;width:24px;text-align:center;}
.float-cluster{position:fixed;top:14px;right:14px;z-index:1000;display:flex;gap:8px;align-items:center;}
.float-cluster .theme-toggle,.float-cluster .nav-toggle{border-color:rgba(44,39,64,.16);background:var(--surface);color:var(--accent);box-shadow:0 4px 14px -5px rgba(0,0,0,.25);-webkit-backdrop-filter:none;backdrop-filter:none;}
:root[data-theme="night"] .float-cluster .theme-toggle,:root[data-theme="night"] .float-cluster .nav-toggle{background:rgba(255,255,255,.08);color:#ffce9e;box-shadow:0 0 16px -4px rgba(255,131,88,.45);}
</style>
<script>
(function(){var K='bukiTheme',mq=window.matchMedia('(prefers-color-scheme: dark)');
function eff(){var s=null;try{s=localStorage.getItem(K)}catch(e){}return(s==='light'||s==='night')?s:(mq.matches?'night':'light');}
function set(t){document.documentElement.setAttribute('data-theme',t);}
set(eff());
function om(){var s=null;try{s=localStorage.getItem(K)}catch(e){}if(s!=='light'&&s!=='night')set(mq.matches?'night':'light');}
if(mq.addEventListener)mq.addEventListener('change',om);else if(mq.addListener)mq.addListener(om);
function w(){var b=document.getElementById('themeToggle');if(!b)return;b.addEventListener('click',function(){var c=document.documentElement.getAttribute('data-theme')||eff();var n=(c==='night')?'light':'night';try{localStorage.setItem(K,n)}catch(e){}set(n);});}
if(document.readyState!=='loading')w();else document.addEventListener('DOMContentLoaded',w);})();
</script>
</head>
<body>
<div class="nav-overlay" id="navOverlay"></div><nav class="nav-drawer" id="navDrawer" aria-hidden="true"><div class="nav-dhead"><span class="nav-dtitle">メニュー</span><button class="nav-close" id="navClose" type="button" aria-label="閉じる"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div><a class="nav-link" href="home.html"><span class="nav-ic">🏠</span>ホーム</a><a class="nav-link" href="page1.html"><span class="nav-ic">📝</span>注文ページ</a><a class="nav-link" href="https://buki-booth.com/portal"><span class="nav-ic">🔗</span>URL変更（マイページ）</a><a class="nav-link" href="page4.html"><span class="nav-ic">⚙️</span>オプション割り当て</a><a class="nav-link" href="message.html"><span class="nav-ic">✉️</span>お問い合わせ</a></nav>

<div class="topbar">
  <div class="topbar-logo">NFC ORDER</div>
  <div class="topbar-right">

    <button id="themeToggle" class="theme-toggle" type="button" aria-label="ライト/ダーク表示を切り替え"><svg class="ic-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg><svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 3v1.5M12 19.5V21M3 12h1.5M19.5 12H21M5.6 5.6l1 1M17.4 17.4l1 1M18.4 5.6l-1 1M6.6 17.4l-1 1"/></svg></button><button id="navToggle" class="nav-toggle" type="button" aria-label="メニューを開く"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </div>
</div>

<div class="wrap">

  <!-- SUCCESS BANNER -->
  <div class="success-banner">
    <div class="success-icon">✓</div>
    <div class="success-title">注文を受け付けました</div>
    <div class="success-sub">内容をご確認ください。<br>制作完了後、別途ご連絡いたします。</div>
    <div class="order-id-badge" id="dispOrderId">—</div>

  <!-- 基本情報 -->
  <div class="card">

      <div class="row">
        <span class="row-label">注文番号</span>
        <span class="row-val" id="diOid">—</span>
      </div>
      <div class="row">
        <span class="row-label">土台カラー</span>

      </div>
      <div class="row">
        <span class="row-label">形状</span>
        <span class="row-val" id="diShape">—</span>
      </div>
      <div class="row">

  <!-- オプション -->
  <div class="card">
    <div class="card-head">⚙️ オプション</div>

      <div class="row">
        <span class="row-label">NFCタグ</span>
        <span class="row-val" id="diNfc">—</span>

      <div class="row" id="nfcUrlRow" style="display:none;">

      <div class="img-row" id="imgRow"></div>
    </div>
  </div>

  <!-- QR位置 -->
  <div class="card" id="nfcPosCard" style="display:none;">
    <div class="card-head">📍 NFCタグの位置</div>

  <div class="card" id="qrPosCard" style="display:none;">

  <!-- 穴位置 -->

          <canvas id="attachMiniCv"></canvas>

  <!-- ACTIONS -->

<script>
// ─── データ読み込み ───
let O = null;
try {
  const raw = sessionStorage.getItem('orderData');
  if (raw) O = JSON.parse(raw);
} catch(e) {}

if (!O) {
  document.body.innerHTML = '<div style="padding:40px;text-align:center;"><p>注文データが見つかりません。</p><a href="page1.html" style="color:#ff7a59;">最初からやり直す</a></div>';
  throw new Error('no order data');
}

// 画像が分割保存されていた場合
if (O.imgFront === '__large__') O.imgFront = sessionStorage.getItem('orderImgFront') || null;
if (O.imgBack  === '__large__') O.imgBack  = sessionStorage.getItem('orderImgBack')  || null;

// ─── 基本情報 ───
document.getElementById('dispOrderId').textContent = O.orderId || '—';
document.getElementById('dispDate').textContent    = O.submittedAt || '';
document.getElementById('diOid').textContent       = O.orderId || '—';

// カラー
const colorEl = document.getElementById('diColor');
if (O.colorHex) {
  const dot = document.createElement('span');
  dot.className = 'color-dot';
  dot.style.background = O.colorHex;
  if (O.colorHex === '#FFFFFF') dot.style.border = '1.5px solid #ccc';
  colorEl.appendChild(dot);
  colorEl.appendChild(document.createTextNode(O.color || '—'));
} else {
  colorEl.textContent = O.color || '—';
}

// 形状
const shapeNames = { circle:'丸型', square:'四角形', rect:'自由四角', diecut:'ダイカット' };
document.getElementById('diShape').textContent  = shapeNames[O.shape] || O.shape || '—';
// サイズ表示：自由四角は横×縦、ダイアは長辺×短辺、その他は長辺
(function(){
  let txt;
  if (O.shape === 'rect' && O.widthCm && O.heightCm) {
    txt = O.widthCm + ' × ' + O.heightCm + ' cm';
  } else if (O.shape === 'diecut' && O.sizeCm) {
    var p = O.dieFront || O.dieBack, asp = 1;
    if (p && p.length >= 3) {
      var x0=1,y0=1,x1=0,y1=0;

function drawImgCanvas(canvasEl, src, shape) {
  canvasEl.width = 200; canvasEl.height = 200;
  canvasEl.style.borderRadius = shape === 'circle' ? '50%' : '10px';
  const ctx = canvasEl.getContext('2d');
  if (!src) {
    ctx.fillStyle = '#eee'; ctx.fillRect(0,0,200,200);
    ctx.fillStyle = '#aaa'; ctx.font = '13px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('画像なし', 100, 100);
    return;
  }
  const img = new Image(); img.src = src;
  img.onload = () => {
    if (shape === 'rect' && O.widthCm && O.heightCm) {
      // 自由四角：縦横比に合わせた長方形でプレビュー
      const ar = O.widthCm / O.heightCm;
      let w, h; if (ar >= 1) { w = 200; h = 200/ar; } else { h = 200; w = 200*ar; }
      const x = (200-w)/2, y = (200-h)/2;
      ctx.clearRect(0,0,200,200);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x+8,y); ctx.arcTo(x+w,y,x+w,y+h,8); ctx.arcTo(x+w,y+h,x,y+h,8); ctx.arcTo(x,y+h,x,y,8); ctx.arcTo(x,y,x+w,y,8); ctx.closePath();
      ctx.clip();
      const ir = img.naturalWidth/img.naturalHeight, br = w/h;
      let dw,dh,dx,dy; if (ir>br){dh=h;dw=dh*ir;dx=x-(dw-w)/2;dy=y;} else {dw=w;dh=dw/ir;dy=y-(dh-h)/2;dx=x;}
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.restore();
    } else { ctx.drawImage(img, 0, 0, 200, 200); }
  };
}

    else if(shape!=='diecut'){ ctx.fillStyle=acryl; ctx.fill(); }
    ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,.30)'; ctx.lineWidth=1.5; bodyPath(ctx); ctx.stroke();
    // 穴をくり抜く
    ctx.beginPath(); ctx.arc(hx,hy,holeR,0,Math.PI*2); ctx.fillStyle=WRAP_BG; ctx.fill();
    ctx.lineWidth=1.4; ctx.strokeStyle='rgba(0,0,0,.45)'; ctx.beginPath(); ctx.arc(hx,hy,holeR,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=1; ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.beginPath(); ctx.arc(hx,hy,Math.max(1,holeR-1.4),0,Math.PI*2); ctx.stroke();
  }

  const useImg = (O.attachView==='back' ? O.imgBack : O.imgFront) || O.imgFront;
  if(useImg){ const im=new Image(); im.onload=()=>draw(im); im.onerror=()=>draw(null); im.src=useImg; }
  else draw(null);
})();
</script>
<script>
(function(){var t=document.getElementById('navToggle'),d=document.getElementById('navDrawer'),o=document.getElementById('navOverlay'),c=document.getElementById('navClose');if(!t||!d)return;function op(){d.classList.add('open');if(o)o.classList.add('open');d.setAttribute('aria-hidden','false');}function cl(){d.classList.remove('open');if(o)o.classList.remove('open');d.setAttribute('aria-hidden','true');}t.addEventListener('click',op);if(c)c.addEventListener('click',cl);if(o)o.addEventListener('click',cl);document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
