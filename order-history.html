<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文履歴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root{
  --ink:#2c2740; --paper:#fffdf7; --cream:#fff4ea;
  --accent:#ff7a59; --accent-press:#e85f3f; --accent2:#f2b134;
  --muted:#8a8398; --border:#f0e3d6;
  --pop:'Mochiy Pop One',sans-serif;--surface:#fff;--sel:#fff8f5;--card-sh:0 5px 0 rgba(124,107,219,.08);--btn-pop:0 3px 0 rgba(0,0,0,.05);--cta-sh:0 4px 0 var(--accent-press);--cta-shA:0 1px 0 var(--accent-press);--topbar:linear-gradient(90deg,#ff7a59,#ff9d6b);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(255,122,89,.10) 2px,transparent 2px);background-size:28px 28px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;width:100%;max-width:560px;margin:0 auto;padding:62px 20px 48px;flex:1;}
/* ヘッダー */
.oh-head{text-align:center;margin-bottom:26px;}
.oh-logo{font-family:var(--pop);font-size:22px;color:var(--ink);}
.oh-sub{font-size:12px;color:var(--muted);line-height:1.7;margin-top:8px;}
/* 追加カード */
.card{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:24px 22px;box-shadow:var(--card-sh);margin-bottom:24px;}
.card-title{font-family:var(--pop);font-size:16px;font-weight:400;margin-bottom:6px;color:var(--ink);}
.card-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
.add-row{display:flex;gap:8px;}
input[type="text"]{flex:1;width:100%;padding:14px 16px;background:var(--surface);border:2px solid var(--border);border-radius:13px;font-family:'Noto Sans JP',sans-serif;font-size:16px;letter-spacing:.04em;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
input[type="text"]::placeholder{color:#c9c2bd;}
input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,122,89,.18);}
.btn-add{flex-shrink:0;padding:0 20px;background:var(--accent);border:none;border-radius:13px;font-family:var(--pop);font-size:13px;color:#fff;cursor:pointer;transition:transform .1s,box-shadow .1s,filter .15s;box-shadow:var(--cta-sh);}
.btn-add:hover{filter:brightness(1.04);}
.btn-add:active{transform:translateY(3px);box-shadow:var(--cta-shA);}
.add-msg{font-size:12px;margin-top:10px;line-height:1.6;display:none;}
.add-msg.err{color:#e0392b;display:block;}
.add-msg.ok{color:#2e9c5a;display:block;}
/* 一覧 */
.list-label{font-family:var(--pop);font-size:14px;color:var(--ink);margin:4px 4px 14px;}
.oh-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:14px;box-shadow:0 5px 0 rgba(124,107,219,.07);}
:root[data-theme="night"] .oh-card{-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);box-shadow:0 16px 40px -24px rgba(0,0,0,.7);}
.oh-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.oh-num{font-family:monospace;font-size:15px;font-weight:700;letter-spacing:.04em;word-break:break-all;}
.oh-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap;}
.ph-cancellable{background:rgba(70,193,120,.16);color:#2e9c5a;}
:root[data-theme="night"] .ph-cancellable{color:#5fd394;}
.ph-started{background:rgba(242,177,52,.18);color:#9a6b08;}
:root[data-theme="night"] .ph-started{background:rgba(255,207,122,.14);color:#ffcf7a;}
.ph-cancelled{background:#fde2e1;color:#c0392b;}
:root[data-theme="night"] .ph-cancelled{background:rgba(255,107,94,.16);color:#ff8c80;}
.oh-note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.6;}
.oh-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.oh-btn{font-size:12.5px;font-weight:700;padding:10px 16px;border-radius:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;border:1.5px solid var(--border);background:var(--surface);color:var(--ink);transition:transform .1s,filter .15s;}
.oh-btn:hover{filter:brightness(1.03);}
.oh-btn:active{transform:translateY(2px);}
.oh-btn.detail{background:var(--sel);border-color:#f3d3c6;color:var(--accent);}
.oh-btn.cancel{background:#fff;border-color:#f5c2c0;color:#c0392b;}
.oh-btn.cancel:hover{background:#fde2e1;}
.oh-btn.remove{margin-left:auto;border-color:var(--border);color:var(--muted);}
.oh-btn[disabled]{opacity:.5;cursor:default;filter:none;transform:none;}
:root[data-theme="night"] .oh-btn.cancel{background:rgba(255,107,94,.06);}
/* 詳細パネル */
.oh-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--cream);}
.oh-detail.open{display:block;}
.dl-row{display:flex;gap:10px;font-size:12.5px;line-height:1.7;padding:3px 0;}
.dl-key{flex-shrink:0;width:88px;color:var(--muted);font-weight:700;}
.dl-val{color:var(--ink);word-break:break-all;}
.dl-imgs{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.dl-imgs figure{text-align:center;font-size:10px;color:var(--muted);}
.dl-imgs img{display:block;width:88px;height:88px;object-fit:contain;border:1.5px solid var(--border);border-radius:10px;background:var(--cream);margin-bottom:4px;}
.dl-empty{font-size:12.5px;color:var(--muted);line-height:1.7;}
/* 空状態 */
.empty{text-align:center;color:var(--muted);font-size:13px;line-height:1.9;padding:36px 22px;background:var(--surface);border:1.6px dashed var(--border);border-radius:20px;}
.empty .empty-ic{font-size:36px;display:block;margin-bottom:10px;}
:root[data-theme="night"] .empty{-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);}
.footer{position:relative;z-index:1;text-align:center;padding:20px;font-size:11px;color:var(--muted);letter-spacing:.04em;}

/* テーマ切替ボタン */
.theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);background:rgba(255,255,255,.2);color:#fff;cursor:pointer;padding:0;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);transition:transform .12s,background .2s;flex-shrink:0;}
.theme-toggle:hover{transform:scale(1.08);}
.theme-toggle:active{transform:scale(.93);}
.theme-toggle svg{width:18px;height:18px;display:block;}
.theme-toggle .ic-sun{display:none;}
:root[data-theme="night"] .theme-toggle .ic-sun{display:block;}
:root[data-theme="night"] .theme-toggle .ic-moon{display:none;}
:root[data-theme="night"] .theme-toggle{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#ffce9e;}

/* ===== ナイトモード ===== */
:root[data-theme="night"]{
  --ink:#ece9f3;--paper:#13111a;--cream:rgba(255,255,255,.06);
  --accent:#ff8358;--accent-press:#c75a3a;--muted:#9b93ac;--border:rgba(255,255,255,.12);
  --surface:rgba(255,255,255,.05);--sel:rgba(255,131,88,.12);
  --card-sh:0 16px 40px -22px rgba(0,0,0,.7);--btn-pop:none;
  --cta-sh:0 0 26px -6px rgba(255,131,88,.55);--cta-shA:0 0 12px -4px rgba(255,131,88,.55);
  --topbar:rgba(20,18,27,.55);--accent2:#ffcf7a;--ok:#46c178;--err:#ff6b5e;
}
:root[data-theme="night"] body{
  background:
    radial-gradient(140% 100% at 85% -8%,rgba(232,64,156,.42),transparent 62%),
    radial-gradient(140% 100% at -12% 108%,rgba(124,86,240,.40),transparent 62%),
    linear-gradient(160deg,#1c1228,#110d19 58%,#160f20);
  background-attachment:fixed;color:var(--ink);
}
:root[data-theme="night"] body::before{background-image:radial-gradient(rgba(255,255,255,.05) 1.5px,transparent 1.5px);}
:root[data-theme="night"] .card{-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);}
:root[data-theme="night"] input[type="text"]{background:rgba(0,0,0,.26);}
:root[data-theme="night"] input[type="text"]::placeholder{color:#6f6880;}

/* メニュー（ハンバーガー） */
.nav-toggle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);background:rgba(255,255,255,.2);color:#fff;cursor:pointer;padding:0;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);transition:transform .12s,background .2s;flex-shrink:0;}
.nav-toggle:hover{transform:scale(1.08);}.nav-toggle:active{transform:scale(.93);}
.nav-toggle svg{width:20px;height:20px;display:block;}
:root[data-theme="night"] .nav-toggle{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#ffce9e;}
.nav-overlay{position:fixed;inset:0;background:rgba(10,8,16,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:1999;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);}
.nav-overlay.open{opacity:1;pointer-events:auto;}
.nav-drawer{position:fixed;top:0;right:0;height:100%;width:min(84vw,330px);background:#fff;color:var(--ink);box-shadow:-12px 0 40px -12px rgba(0,0,0,.4);transform:translateX(102%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:2000;display:flex;flex-direction:column;overflow-y:auto;}
.nav-drawer.open{transform:translateX(0);}
:root[data-theme="night"] .nav-drawer{background:#1b1726;box-shadow:-12px 0 50px -10px rgba(0,0,0,.7);}
.nav-dhead{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--border);}
.nav-dtitle{font-family:var(--pop);font-size:16px;color:var(--ink);}
.nav-close{width:34px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.nav-close:hover{background:var(--cream);}.nav-close svg{width:18px;height:18px;}
.nav-link{display:flex;align-items:center;gap:12px;padding:15px 20px;color:var(--ink);text-decoration:none;font-size:15px;font-weight:700;border-bottom:1px solid var(--border);transition:background .15s;}
.nav-link:hover{background:var(--cream);}.nav-link:active{background:var(--sel);}
.nav-link.cur{color:var(--accent);background:var(--sel);}
.nav-ic{font-size:18px;width:24px;text-align:center;}
.float-cluster{position:fixed;top:14px;right:14px;z-index:1000;display:flex;gap:8px;align-items:center;}
.float-cluster .theme-toggle,.float-cluster .nav-toggle{border-color:rgba(44,39,64,.16);background:var(--surface);color:var(--accent);box-shadow:0 4px 14px -5px rgba(0,0,0,.25);-webkit-backdrop-filter:none;backdrop-filter:none;}
:root[data-theme="night"] .float-cluster .theme-toggle,:root[data-theme="night"] .float-cluster .nav-toggle{background:rgba(255,255,255,.08);color:#ffce9e;box-shadow:0 0 16px -4px rgba(255,131,88,.45);}

/* 確認モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(10,8,16,.55);display:none;align-items:center;justify-content:center;padding:22px;z-index:3000;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:26px 24px;max-width:360px;width:100%;box-shadow:0 24px 60px -20px rgba(0,0,0,.5);}
:root[data-theme="night"] .modal{-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);}
.modal-ic{font-size:34px;text-align:center;margin-bottom:10px;}
.modal-title{font-family:var(--pop);font-size:17px;text-align:center;color:var(--ink);margin-bottom:10px;}
.modal-body{font-size:13px;color:var(--muted);line-height:1.8;text-align:center;margin-bottom:20px;}
.modal-body .mb-num{font-family:monospace;font-weight:700;color:var(--ink);}
.modal-actions{display:flex;gap:10px;}
.modal-btn{flex:1;padding:13px;border-radius:12px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);}
.modal-btn.keep{background:var(--surface);color:var(--muted);}
.modal-btn.do{background:#e0392b;border-color:#e0392b;color:#fff;}
.modal-btn.do:active{transform:translateY(2px);}
</style>
<script>
(function(){var K='bukiTheme',mq=window.matchMedia('(prefers-color-scheme: dark)');
function eff(){var s=null;try{s=localStorage.getItem(K)}catch(e){}return(s==='light'||s==='night')?s:(mq.matches?'night':'light');}
function set(t){document.documentElement.setAttribute('data-theme',t);}
set(eff());
function om(){var s=null;try{s=localStorage.getItem(K)}catch(e){}if(s!=='light'&&s!=='night')set(mq.matches?'night':'light');}
if(mq.addEventListener)mq.addEventListener('change',om);else if(mq.addListener)mq.addListener(om);
function w(){var b=document.getElementById('themeToggle');if(!b)return;b.addEventListener('click',function(){var c=document.documentElement.getAttribute('data-theme')||eff();var n=(c==='night')?'light':'night';try{localStorage.setItem(K,n)}catch(e){}set(n);});}
if(document.readyState!=='loading')w();else document.addEventListener('DOMContentLoaded',w);})();
</script>
</head>
<body>
<div class="float-cluster"><button id="themeToggle" class="theme-toggle" type="button" aria-label="ライト/ダーク表示を切り替え"><svg class="ic-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg><svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 3v1.5M12 19.5V21M3 12h1.5M19.5 12H21M5.6 5.6l1 1M17.4 17.4l1 1M18.4 5.6l-1 1M6.6 17.4l-1 1"/></svg></button><button id="navToggle" class="nav-toggle" type="button" aria-label="メニューを開く"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button></div>
<div class="nav-overlay" id="navOverlay"></div><nav class="nav-drawer" id="navDrawer" aria-hidden="true"><div class="nav-dhead"><span class="nav-dtitle">メニュー</span><button class="nav-close" id="navClose" type="button" aria-label="閉じる"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div><a class="nav-link" href="home.html"><span class="nav-ic">🏠</span>ホーム</a><a class="nav-link" href="page1.html"><span class="nav-ic">📝</span>注文ページ</a><a class="nav-link cur" href="order-history.html"><span class="nav-ic">📋</span>注文履歴</a><a class="nav-link" href="https://buki-booth.com/portal"><span class="nav-ic">🔗</span>URL変更（マイページ）</a><a class="nav-link" href="page4.html"><span class="nav-ic">⚙️</span>オプション割り当て</a><a class="nav-link" href="message.html"><span class="nav-ic">✉️</span>お問い合わせ</a></nav>

<div class="wrap">
  <div class="oh-head">
    <div class="oh-logo">📋 注文履歴</div>
    <div class="oh-sub">注文番号を入れると、注文の状態を確認できます。<br>この端末に保存されるので、別の端末では表示されません。</div>
  </div>

  <div class="card">
    <div class="card-title">注文番号を追加</div>
    <div class="card-desc">確認したい注文番号を入力して「追加」を押してください。</div>
    <label for="orderInput">注文番号</label>
    <div class="add-row">
      <input type="text" id="orderInput" placeholder="例：1234567890" autocomplete="off" inputmode="numeric">
      <button class="btn-add" onclick="addOrder()">＋ 追加</button>
    </div>
    <div class="add-msg" id="addMsg"></div>
  </div>

  <div class="list-label">あなたの注文一覧</div>
  <div id="listArea"><div class="empty">読み込み中...</div></div>
</div>

<div class="footer">© NFC Order System</div>

<!-- キャンセル確認モーダル -->
<div class="modal-overlay" id="cancelModal">
  <div class="modal">
    <div class="modal-ic">⚠️</div>
    <div class="modal-title">本当にキャンセルしますか？</div>
    <div class="modal-body">注文番号 <span class="mb-num" id="modalNum">—</span> をキャンセルします。<br>キャンセルすると注文内容は削除され、元に戻せません。</div>
    <div class="modal-actions">
      <button class="modal-btn keep" onclick="closeCancelModal()">やめる</button>
      <button class="modal-btn do" id="modalDoBtn" onclick="confirmCancel()">キャンセルする</button>
    </div>
  </div>
</div>

<script>
const WORKER_ORIGIN = sessionStorage.getItem('workerOrigin') || 'https://buki-booth.com';
const LS = 'buki_order_numbers';
const shapeNames = { circle:'丸型', square:'四角形', rect:'自由四角', diecut:'ダイカット' };
const DATA = {};        // orderId -> /api/customer-order レスポンス
let cancelTarget = null;

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function getNums(){ try { return JSON.parse(localStorage.getItem(LS) || '[]'); } catch(e){ return []; } }
function saveNums(a){ try { localStorage.setItem(LS, JSON.stringify(a)); } catch(e){} }
function addNum(n){ var a = getNums(); if (a.indexOf(n) < 0){ a.unshift(n); saveNums(a); } }
function removeNum(n){ saveNums(getNums().filter(function(x){ return x !== n; })); }

function fmtDate(s){ if(!s) return '—'; try { var d = new Date(s); if(isNaN(d)) return s; return d.toLocaleString('ja-JP'); } catch(e){ return s; } }

function fetchOrder(orderId){
  return fetch(WORKER_ORIGIN + '/api/customer-order?orderId=' + encodeURIComponent(orderId))
    .then(function(r){ return r.json(); })
    .catch(function(){ return { error: 'comm' }; });
}

// ─── 追加 ───
function addOrder(){
  var inp = document.getElementById('orderInput');
  var msg = document.getElementById('addMsg');
  var v = (inp.value || '').trim();
  msg.className = 'add-msg';
  if (!v){ msg.className = 'add-msg err'; msg.textContent = '注文番号を入力してください。'; return; }
  if (getNums().indexOf(v) >= 0){ msg.className = 'add-msg err'; msg.textContent = 'この注文番号はすでに一覧にあります。'; return; }
  msg.className = 'add-msg'; msg.style.display = 'block'; msg.textContent = '確認中...';
  fetchOrder(v).then(function(d){
    if (d && d.error === 'comm'){ msg.className = 'add-msg err'; msg.textContent = '通信エラーが発生しました。もう一度お試しください。'; return; }
    if (!d || !d.exists){ msg.className = 'add-msg err'; msg.textContent = '注文なしです。番号をご確認ください。'; return; }
    addNum(v); DATA[v] = d;
    inp.value = '';
    msg.className = 'add-msg ok'; msg.textContent = '注文を追加しました。';
    render();
  });
}

// ─── 注文詳細のHTML ───
function detailHTML(d){
  if (d.cancelled || !d.order){
    var t = d.cancelled ? 'この注文はキャンセルされ、内容は削除されました。' : '注文内容が見つかりませんでした。';
    return '<div class="dl-empty">' + t + '</div>';
  }
  var o = d.order;
  function row(k, v){ return '<div class="dl-row"><span class="dl-key">' + k + '</span><span class="dl-val">' + v + '</span></div>'; }
  var html = '';
  html += row('土台カラー', esc(o.color || '—'));
  html += row('形状', esc(shapeNames[o.shape] || o.shape || '—'));
  var size = (o.shape === 'rect' && o.widthCm && o.heightCm)
    ? (o.widthCm + ' × ' + o.heightCm + ' cm')
    : ((o.sizeCm ? o.sizeCm + ' cm' : '—'));
  html += row('サイズ', esc(size));
  if (o.thickCm) html += row('厚み', esc(o.thickCm + ' mm'));
  html += row('NFCタグ', o.nfc ? (o.nfcUrl ? esc(o.nfcUrl) : '（URL未設定）') : 'なし');
  html += row('QRコード', o.qr ? (o.qrUrl ? esc(o.qrUrl) : '（URL未設定）') : 'なし');
  if (o.quantity) html += row('製作枚数', esc(o.quantity + ' 枚'));
  if (o.submittedAt) html += row('申込日時', esc(o.submittedAt));
  // 画像サムネイル
  var imgs = '';
  if (o.imgFront) imgs += '<figure><img src="' + esc(o.imgFront) + '" alt="おもて">おもて</figure>';
  if (o.backPrint && o.imgBack) imgs += '<figure><img src="' + esc(o.imgBack) + '" alt="うら">うら</figure>';
  if (imgs) html += '<div class="dl-imgs">' + imgs + '</div>';
  return html;
}

// ─── 1注文カードのHTML ───
function cardHTML(orderId, d){
  var enc = esc(orderId);
  // 通信失敗・未取得
  if (!d || d.error === 'comm'){
    return '<div class="oh-card"><div class="oh-top"><span class="oh-num">' + enc + '</span>'
      + '<span class="oh-badge ph-started">確認できませんでした</span></div>'
      + '<div class="oh-note">通信エラーで状態を取得できませんでした。</div>'
      + '<div class="oh-actions"><button class="oh-btn remove" onclick="removeCard(\'' + enc + '\')">一覧から削除</button></div></div>';
  }
  // 注文なし（端末には残っているが番号が消えた等）
  if (!d.exists){
    return '<div class="oh-card"><div class="oh-top"><span class="oh-num">' + enc + '</span>'
      + '<span class="oh-badge ph-started">注文なし</span></div>'
      + '<div class="oh-note">この注文番号は見つかりませんでした。</div>'
      + '<div class="oh-actions"><button class="oh-btn remove" onclick="removeCard(\'' + enc + '\')">一覧から削除</button></div></div>';
  }
  var badge, note = '';
  if (d.phase === 'cancelled'){
    badge = '<span class="oh-badge ph-cancelled">キャンセルされました</span>';
    note  = 'この注文はキャンセルされました。';
  } else if (d.phase === 'started'){
    badge = '<span class="oh-badge ph-started">作成が始まりました</span>';
    note  = d.made ? '作成が始まったため、キャンセルできません。' : '注文から3日が過ぎたため、キャンセルできません。';
  } else {
    badge = '<span class="oh-badge ph-cancellable">キャンセルできます</span>';
    note  = '注文から3日以内・作成前なので、キャンセルできます。';
  }
  var html = '<div class="oh-card" id="card-' + enc + '">';
  html += '<div class="oh-top"><span class="oh-num">' + enc + '</span>' + badge + '</div>';
  if (note) html += '<div class="oh-note">' + note + '</div>';
  html += '<div class="oh-actions">';
  html += '<button class="oh-btn detail" onclick="toggleDetail(\'' + enc + '\')">詳細を見る</button>';
  if (d.cancellable){
    html += '<button class="oh-btn cancel" onclick="openCancelModal(\'' + enc + '\')">キャンセル</button>';
  } else if (d.phase !== 'cancelled'){
    html += '<button class="oh-btn cancel" disabled>キャンセル不可</button>';
  }
  html += '<button class="oh-btn remove" onclick="removeCard(\'' + enc + '\')">一覧から削除</button>';
  html += '</div>';
  // 詳細パネル
  html += '<div class="oh-detail" id="detail-' + enc + '">' + detailHTML(d);
  if (d.cancellable){
    html += '<div class="oh-actions"><button class="oh-btn cancel" onclick="openCancelModal(\'' + enc + '\')">この注文をキャンセル</button></div>';
  }
  html += '</div>';
  html += '</div>';
  return html;
}

// ─── 一覧描画（全番号を再取得） ───
function render(){
  var nums = getNums();
  var area = document.getElementById('listArea');
  if (!nums.length){
    area.innerHTML = '<div class="empty"><span class="empty-ic">📋</span>まだ注文がありません。<br>上の入力欄に注文番号を入れて「追加」を押すと、ここに表示されます。</div>';
    return;
  }
  Promise.all(nums.map(function(n){
    if (DATA[n] && DATA[n].exists) return Promise.resolve(DATA[n]);
    return fetchOrder(n).then(function(d){ DATA[n] = d; return d; });
  })).then(function(results){
    var html = '';
    for (var i = 0; i < nums.length; i++){ html += cardHTML(nums[i], results[i]); }
    area.innerHTML = html;
  });
}

// 状態を必ず最新化してから描画（キャンセル後など）
function refresh(orderId){
  return fetchOrder(orderId).then(function(d){ DATA[orderId] = d; render(); });
}

function toggleDetail(orderId){
  var el = document.getElementById('detail-' + orderId);
  if (el) el.classList.toggle('open');
}

function removeCard(orderId){
  removeNum(orderId); delete DATA[orderId]; render();
}

// ─── キャンセル確認モーダル ───
function openCancelModal(orderId){
  cancelTarget = orderId;
  document.getElementById('modalNum').textContent = orderId;
  document.getElementById('cancelModal').classList.add('open');
}
function closeCancelModal(){
  cancelTarget = null;
  document.getElementById('cancelModal').classList.remove('open');
}
function confirmCancel(){
  if (!cancelTarget) return;
  var orderId = cancelTarget;
  var btn = document.getElementById('modalDoBtn');
  btn.disabled = true; var orig = btn.textContent; btn.textContent = 'キャンセル中...';
  fetch(WORKER_ORIGIN + '/api/customer-cancel', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ orderId: orderId }),
  }).then(function(r){ return r.json().then(function(d){ return { status: r.status, d: d }; }); })
    .then(function(res){
      btn.disabled = false; btn.textContent = orig;
      closeCancelModal();
      if (res.d && res.d.ok){
        var msg = document.getElementById('addMsg');
        msg.className = 'add-msg ok'; msg.textContent = '注文 ' + orderId + ' をキャンセルしました。';
      } else {
        var m2 = document.getElementById('addMsg');
        m2.className = 'add-msg err'; m2.textContent = (res.d && res.d.error) || 'キャンセルできませんでした。';
      }
      refresh(orderId);  // 最新状態（キャンセル済み or started）に更新
    }).catch(function(){
      btn.disabled = false; btn.textContent = orig; closeCancelModal();
      var m3 = document.getElementById('addMsg'); m3.className = 'add-msg err'; m3.textContent = '通信エラーが発生しました。';
    });
}

document.getElementById('orderInput').addEventListener('keydown', function(e){ if (e.key === 'Enter') addOrder(); });
document.getElementById('cancelModal').addEventListener('click', function(e){ if (e.target === this) closeCancelModal(); });

render();
</script>

(function(){var t=document.getElementById('navToggle'),d=document.getElementById('navDrawer'),o=document.getElementById('navOverlay'),c=document.getElementById('navClose');if(!t||!d)return;function op(){d.classList.add('open');if(o)o.classList.add('open');d.setAttribute('aria-hidden','false');}function cl(){d.classList.remove('open');if(o)o.classList.remove('open');d.setAttribute('aria-hidden','true');}t.addEventListener('click',op);if(c)c.addEventListener('click',cl);if(o)o.addEventListener('click',cl);document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
